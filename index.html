<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-SRSCS0W200"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-SRSCS0W200');
</script>
<title>FindAI — Search Every Listing</title>
<meta name="description" content="The AI that finds anything — cars, property, jobs, products and more.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23000'/><text x='50' y='68' text-anchor='middle' font-family='Arial' font-size='52' font-weight='900' fill='white'>f</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#000;color:#fff;min-height:100vh;display:flex;flex-direction:column}

/* ── NAV ── */
nav{padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;background:#000}
.nav-logo{font-size:24px;font-weight:700;color:#fff;cursor:pointer;letter-spacing:-0.5px;font-family:'DM Sans',sans-serif}
.nav-links{display:flex;gap:6px}
.nav-link{padding:6px 14px;border-radius:20px;font-size:13px;color:#888;background:transparent;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color 0.15s}
.nav-link:hover{color:#fff}

/* ── LAYOUT ── */
.app{display:flex;flex:1;height:calc(100vh - 56px)}

/* ── SIDEBAR ── */
.sidebar{width:240px;padding:12px 8px;display:flex;flex-direction:column;gap:2px;border-right:1px solid #1a1a1a;flex-shrink:0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sb-new{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:15px;color:#888;background:none;border:none;font-family:'DM Sans',sans-serif;width:100%;text-align:left;transition:all 0.15s;margin-bottom:8px}
.sb-new:hover{background:#111;color:#fff}
.sb-section{font-size:12px;color:#555;padding:8px 14px 6px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em}
.sb-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:15px;color:#888;background:none;border:none;font-family:'DM Sans',sans-serif;width:100%;text-align:left;transition:all 0.15s}
.sb-item:hover{background:#111;color:#fff}
.sb-item.active{background:#111;color:#fff}
.sb-dot{width:6px;height:6px;border-radius:50%;background:#19c37d;flex-shrink:0}
.sb-dot-grey{width:6px;height:6px;border-radius:50%;background:#333;flex-shrink:0}

/* ── CHAT AREA ── */
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* ── WELCOME ── */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px 120px;text-align:center}
.welcome h1{font-size:clamp(26px,4vw,38px);font-weight:500;color:#fff;margin-bottom:10px;letter-spacing:-0.5px}
.welcome-sub{font-size:15px;color:#666;margin-bottom:36px}

/* preview grid — 8 cards, wider */
.preview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:960px;width:100%;margin:0 auto 32px}
.prev-card{background:#111;border:1px solid #222;border-radius:10px;overflow:hidden;cursor:pointer;transition:opacity 0.5s,transform 0.5s,border-color 0.15s;text-decoration:none;display:block;color:inherit}
.prev-card:hover{border-color:#444;transform:translateY(-1px)}
.prev-card.fade-out{opacity:0;transform:translateY(6px)}
.prev-card-img{width:100%;height:110px;object-fit:cover;display:block;background:#1a1a1a}
.prev-card-ph{width:100%;height:110px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:24px}
.prev-card-body{padding:8px 10px}
.prev-card-make{font-size:11px;color:#888;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prev-card-title{font-size:11px;color:#aaa;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prev-card-price{font-size:14px;font-weight:600;color:#19c37d}

/* ── MESSAGES ── */
.messages{flex:1;overflow-y:auto;padding:32px 24px 120px;display:flex;flex-direction:column;gap:20px;width:100%;align-self:stretch}
.messages-inner{max-width:860px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:20px;flex:1}
.msg{display:flex;gap:12px;width:100%}
.msg.user{flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.msg-av.u{background:#19c37d;color:#000}
/* AI avatar — no letter, just a subtle dot */
.msg-av.a{background:#111;border:1px solid #333;position:relative}
.msg-av.a::after{content:'';width:8px;height:8px;border-radius:50%;background:#19c37d;position:absolute}
.msg-body{max-width:calc(100% - 44px);font-size:14px;line-height:1.65;color:#e5e5e5;padding:12px 16px;border-radius:12px;background:#111;border:1px solid #222}
.msg.user .msg-body{background:#19c37d;color:#000;border-color:#19c37d}

/* listings in chat — white cards, wider */
.chat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-top:12px}
.chat-card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden;text-decoration:none;display:block;color:inherit;transition:box-shadow 0.15s,transform 0.15s}
.chat-card:hover{box-shadow:0 6px 24px rgba(0,0,0,0.13);transform:translateY(-2px)}
.chat-card-img{width:100%;height:260px;object-fit:cover;display:block;background:#f5f5f5}
.chat-card-ph{width:100%;height:260px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:40px}
.chat-card-body{padding:14px 16px}
.chat-card-title{font-size:13px;color:#444;margin-bottom:8px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.chat-card-price{font-size:20px;font-weight:800;color:#000;letter-spacing:-0.5px}
.chat-card-loc{font-size:11px;color:#999;margin-top:4px}

/* thinking */
.thinking{display:flex;gap:5px;padding:12px 16px;background:#111;border:1px solid #222;border-radius:12px;width:fit-content}
.thinking span{width:7px;height:7px;background:#444;border-radius:50%;animation:bounce 1.2s infinite}
.thinking span:nth-child(2){animation-delay:0.2s}
.thinking span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

/* ── INPUT ── */
.input-area{padding:12px 24px 20px;background:#000;position:fixed;bottom:0;left:240px;right:0;z-index:50;border-top:1px solid #1a1a1a}
.input-wrap{max-width:760px;margin:0 auto;background:#111;border:1px solid #2a2a2a;border-radius:14px;display:flex;align-items:flex-end;gap:8px;padding:10px 12px 10px 16px;transition:border-color 0.15s}
.input-wrap:focus-within{border-color:#444}
.chat-in{flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;resize:none;max-height:120px;min-height:24px;line-height:1.5}
.chat-in::placeholder{color:#555}
.send-btn{width:34px;height:34px;border-radius:8px;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s}
.send-btn:hover{background:#e0e0e0}
.send-btn:disabled{background:#222;cursor:not-allowed}
.input-hint{text-align:center;font-size:11px;color:#444;margin-top:8px;max-width:760px;margin-left:auto;margin-right:auto}

/* skel */
.skel{background:linear-gradient(90deg,#111 25%,#1a1a1a 50%,#111 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#222;border-radius:3px}

@media(max-width:700px){
  .sidebar{display:none}
  .input-area{left:0}
  .chat-grid{grid-template-columns:repeat(2,1fr)}
  .preview-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<nav>
  <span class="nav-logo" onclick="resetChat()">FindAI</span>
  <div class="nav-links">
    <button class="nav-link" onclick="resetChat()">New search</button>
  </div>
</nav>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <button class="sb-new" onclick="resetChat()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      New search
    </button>

    <div class="sb-section">Categories</div>
    <button class="sb-item active" onclick="quickSearch('Show me cars for sale')">🚗 &nbsp;Cars</button>
    <button class="sb-item" onclick="quickSearch('Show me houses and property for sale')">🏠 &nbsp;Property</button>
    <button class="sb-item" onclick="quickSearch('Show me designer clothes and fashion')">👗 &nbsp;Fashion</button>
    <button class="sb-item" onclick="quickSearch('Show me sneakers and shoes')">👟 &nbsp;Sneakers</button>
    <button class="sb-item" onclick="quickSearch('Show me watches and jewellery')">⌚ &nbsp;Watches</button>
    <button class="sb-item" onclick="quickSearch('Show me motorcycles for sale')">🏍️ &nbsp;Motorcycles</button>
    <button class="sb-item" onclick="quickSearch('Show me boats for sale')">⛵ &nbsp;Boats</button>
    <button class="sb-item" onclick="quickSearch('Show me vintage collectibles')">🏺 &nbsp;Collectibles</button>
    <button class="sb-item" onclick="quickSearch('Show me electronics and tech gadgets')">💻 &nbsp;Electronics</button>
    <button class="sb-item" onclick="quickSearch('Show me sports equipment')">⚽ &nbsp;Sports</button>
  </div>

  <!-- Chat -->
  <div class="chat">
    <!-- Welcome -->
    <div class="welcome" id="welcome">
      <h1>What are you looking for?</h1>
      <p class="welcome-sub">Search any listing in the world — just describe what you want</p>
      <div class="preview-grid" id="preview-grid"></div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages" style="display:none">
      <div class="messages-inner" id="messages-inner"></div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrap">
        <textarea id="chat-in" class="chat-in" placeholder='Try "Show me a Porsche 911 under $100k" or "Find me a boat in Australia"' rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMsg()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
        </button>
      </div>
      <div class="input-hint">FindAI searches eBay listings in real time across AU · US · UK · DE</div>
    </div>
  </div>
</div>

<script>
const WORKER = 'https://api.carsearchapi.workers.dev';
let country = 'AU';
let busy = false;
let previewItems = [];
let previewIdx = 0;

function setCountry(code, el) {
  country = code;
  document.querySelectorAll('[id^="c-"]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function resetChat() {
  document.getElementById('welcome').style.display = 'flex';
  document.getElementById('messages').style.display = 'none';
  document.getElementById('messages-inner').innerHTML = '';
  document.getElementById('chat-in').value = '';
}

function showChat() {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('messages').style.display = 'flex';
}

function addMsg(role, html) {
  const msgs = document.getElementById('messages');
  const inner = document.getElementById('messages-inner');
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  const av = role === 'user'
    ? `<div class="msg-av u">U</div>`
    : `<div class="msg-av a"></div>`;
  d.innerHTML = role === 'user'
    ? `${av}<div class="msg-body">${html}</div>`
    : `${av}<div class="msg-body">${html}</div>`;
  inner.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return d.querySelector('.msg-body');
}

function addThinking() {
  const msgs = document.getElementById('messages');
  const inner = document.getElementById('messages-inner');
  const d = document.createElement('div');
  d.className = 'msg assistant';
  d.id = 'thinking';
  d.innerHTML = `<div class="msg-av a"></div><div class="thinking"><span></span><span></span><span></span></div>`;
  inner.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeThinking() {
  const t = document.getElementById('thinking');
  if (t) t.remove();
}

function parseQuery(text) {
  const lower = text.toLowerCase();

  // Strip filler phrases at start
  let cleaned = lower
    .replace(/^(show me|find me|search for|look for|i want|get me|can you find|find|show|search)\s+/i, '')
    .replace(/\b(a|an|the|some|any)\s+/gi, ' ')
    .replace(/\bfor sale\b/gi, '')
    .replace(/\s+/g, ' ')
    .trim();

  // Price extraction — must happen before stripping "for"
  let maxPrice = '';
  const pm = cleaned.match(/(?:under|below|max|less than|for less than|up to|no more than|for)\s*\$?\s*([0-9,.]+)\s*(k|m|thousand|dollars|dollar|usd|aud)?/i);
  if (pm) {
    let p = parseFloat(pm[1].replace(/,/g,''));
    const unit = (pm[2]||'').toLowerCase();
    if (unit==='k') p *= 1000;
    if (unit==='m') p *= 1000000;
    maxPrice = Math.round(p);
    // Remove the entire price phrase
    cleaned = cleaned.replace(/(?:under|below|max|less than|for less than|up to|no more than|for)\s*\$?\s*[0-9,.]+\s*(k|m|thousand|dollars|dollar|usd|aud)?/i, '');
  }

  // Clean up leftover words
  cleaned = cleaned
    .replace(/\b(dollars|dollar|usd|aud|less|than)\b/gi, '')
    .replace(/\s+/g, ' ')
    .trim();

  // Country detection
  let c = country;
  if (lower.includes('australia')) c='AU';
  else if (lower.includes('united states')||lower.includes('america')) c='US';
  else if (lower.includes('united kingdom')||lower.includes('england')) c='UK';
  else if (lower.includes('germany')||lower.includes('german')) c='DE';

  return { q: cleaned, maxPrice, country: c };
}

function renderCards(items, label, _model, maxPrice, c, ebayCount, etsyCount) {
  const sym = c==='UK'?'£':c==='DE'?'€':'$';
  if (!items.length) return `<p style="color:#666;font-size:14px;margin-top:8px">No listings found right now. Try a different search.</p>`;
  const top = items.slice(0,12);

  const totalFound = ebayCount + etsyCount;
  const displayCount = totalFound > 0 ? totalFound : items.length;
  let summary = `Found <strong style="color:#fff">${displayCount} listing${displayCount!==1?'s':''}</strong>`;
  if (ebayCount > 0 && etsyCount > 0) {
    summary += ` <span style="color:#555;font-size:12px">(${ebayCount} eBay · ${etsyCount} Etsy)</span>`;
  } else if (ebayCount > 0) {
    summary += ` <span style="color:#555;font-size:12px">on eBay</span>`;
  } else if (etsyCount > 0) {
    summary += ` <span style="color:#555;font-size:12px">on Etsy</span>`;
  }
  if (label) summary += ` for <em style="color:#ccc">${label}</em>`;
  if (maxPrice) summary += ` under ${sym}${Number(maxPrice).toLocaleString()}`;
  summary += `. Showing top ${top.length}:`;

  const cards = top.map(item => {
    const price = item.price ? `${sym}${Number(item.price).toLocaleString()}` : 'See listing';
    const isEtsy = item.source === 'Etsy';
    const badge = isEtsy
      ? `<span style="font-size:13px;background:#F1641E;color:white;padding:3px 10px;border-radius:5px;font-weight:700">Etsy</span>`
      : `<span style="font-size:22px;font-family:Arial,sans-serif;font-weight:900;letter-spacing:-0.5px;line-height:1"><span style="color:#E53238">e</span><span style="color:#0064D2">b</span><span style="color:#F5AF02">a</span><span style="color:#86B817">y</span></span>`;
    // Upgrade eBay image to higher resolution
    const imgSrc = item.image ? item.image.replace(/s-l\d+\./, 's-l600.') : null;
    return `<a class="chat-card" href="${item.url||'#'}" target="_blank" rel="noopener">
      ${imgSrc
        ? `<img class="chat-card-img" src="${imgSrc}" alt="" loading="lazy" onerror="this.src='${item.image}'">`
        : `<div class="chat-card-ph">${isEtsy?'🎨':'🛍️'}</div>`}
      <div class="chat-card-body">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">${badge}</div>
        <div class="chat-card-title">${item.title||''}</div>
        <div class="chat-card-price">${price}</div>
        <div class="chat-card-loc">${item.location||''}</div>
      </div>
    </a>`;
  }).join('');
  return `<p style="font-size:13px;color:#888;margin-bottom:10px">${summary}</p><div class="chat-grid">${cards}</div>`;
}

async function sendMsg() {
  const inp = document.getElementById('chat-in');
  const q = inp.value.trim();
  if (!q || busy) return;
  busy = true;
  document.getElementById('send-btn').disabled = true;
  inp.value = '';
  inp.style.height = 'auto';
  showChat();
  addMsg('user', q);
  addThinking();
  const { q: cleanQ, maxPrice, country: c } = parseQuery(q);

  try {
    const params = new URLSearchParams({ q: cleanQ, maxPrice: maxPrice||'', country: c });
    const res = await fetch(`${WORKER}/?${params}`);
    const data = await res.json();
    removeThinking();
    addMsg('assistant', renderCards(data.items||[], cleanQ, '', maxPrice, c, data.ebayCount||0, data.etsyCount||0));
    const msgs2 = document.getElementById('messages');
    setTimeout(() => { msgs2.scrollTop = msgs2.scrollHeight; }, 100);
  } catch(e) {
    removeThinking();
    addMsg('assistant', 'Sorry, could not fetch listings right now. Please try again.');
    const msgs2 = document.getElementById('messages');
    setTimeout(() => { msgs2.scrollTop = msgs2.scrollHeight; }, 100);
  }
  busy = false;
  document.getElementById('send-btn').disabled = false;
  inp.focus();
}

function quickSearch(text) {
  document.getElementById('chat-in').value = text;
  sendMsg();
}

function handleKey(e) {
  if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
}

function autoResize(el) {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}

// ── Rotating preview listings — 8 cards, popular searches ────────────────
const PREVIEWS = [
  {q:'Porsche 911', country:'AU'},
  {q:'Ferrari 488', country:'US'},
  {q:'vintage Rolex watch', country:'US'},
  {q:'BMW M3', country:'AU'},
  {q:'Nike Air Jordan sneakers', country:'US'},
  {q:'Lamborghini Huracan', country:'US'},
  {q:'Louis Vuitton bag', country:'US'},
  {q:'Ford Ranger', country:'AU'},
  {q:'vintage vinyl records', country:'UK'},
  {q:'PlayStation 5', country:'AU'},
  {q:'Harley Davidson motorcycle', country:'US'},
  {q:'Apple MacBook', country:'AU'},
];

async function loadPreviews() {
  const grid = document.getElementById('preview-grid');
  if (!grid) return;

  // Show 8 skeleton cards
  grid.innerHTML = Array.from({length:8},()=>`
    <div class="prev-card">
      <div class="skel prev-card-img"></div>
      <div class="prev-card-body">
        <div class="skel" style="height:9px;width:70%;margin-bottom:4px"></div>
        <div class="skel" style="height:9px;width:85%;margin-bottom:5px"></div>
        <div class="skel" style="height:12px;width:40%"></div>
      </div>
    </div>`).join('');

  const results = await Promise.allSettled(
    PREVIEWS.map(s =>
      fetch(`${WORKER}/?q=${encodeURIComponent(s.q)}&country=${s.country}`)
        .then(r=>r.json())
        .then(d=>(d.items||[]).filter(i=>i.image).slice(0,3).map(i=>({...i,searchMake:s.q,searchModel:'',country:s.country})))
        .catch(()=>[])
    )
  );

  results.forEach(r=>{if(r.status==='fulfilled')previewItems.push(...r.value);});

  // Shuffle for variety
  previewItems = previewItems.sort(()=>Math.random()-0.5);

  if (!previewItems.length) { grid.innerHTML=''; return; }

  const show = previewItems.slice(0,8);
  grid.innerHTML = show.map(buildPrevCard).join('');
  previewIdx = 8;
  setInterval(rotatePrev, 3200);
}

function buildPrevCard(item) {
  const sym = item.country==='UK'?'£':item.country==='DE'?'€':'$';
  const price = item.price ? `${sym}${Number(item.price).toLocaleString()}` : '';
  const title = (item.title||'').substring(0,40) + (item.title&&item.title.length>40?'…':'');
  return `<a class="prev-card" href="${item.url||'#'}" target="_blank" rel="noopener">
    ${item.image
      ? `<img class="prev-card-img" src="${item.image}" alt="" loading="lazy" onerror="this.outerHTML='<div class=prev-card-ph>🛍️</div>'">`
      : `<div class="prev-card-ph">🛍️</div>`}
    <div class="prev-card-body">
      <div class="prev-card-title">${title}</div>
      <div class="prev-card-price">${price}</div>
    </div>
  </a>`;
}

function rotatePrev() {
  if (previewItems.length < 9) return;
  const grid = document.getElementById('preview-grid');
  if (!grid) return;
  const cards = grid.querySelectorAll('.prev-card');
  if (!cards.length) return;
  const idx = Math.floor(Math.random()*cards.length);
  const card = cards[idx];
  card.classList.add('fade-out');
  setTimeout(()=>{
    const newItem = previewItems[previewIdx % previewItems.length];
    previewIdx++;
    const tmp = document.createElement('div');
    tmp.innerHTML = buildPrevCard(newItem);
    card.replaceWith(tmp.firstElementChild);
  }, 500);
}

loadPreviews();
</script>
</body>
</html>
