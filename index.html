<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#000;color:#fff;min-height:100vh;display:flex;flex-direction:column}
nav{padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;position:fixed;top:0;left:0;right:0;z-index:1000;background:#000;border-bottom:1px solid #1a1a1a}
.nav-logo{font-size:24px;font-weight:700;color:#fff;cursor:pointer;letter-spacing:-0.5px;font-family:'DM Sans',sans-serif}
.nav-links{display:flex;gap:6px}
.nav-link{padding:6px 14px;border-radius:20px;font-size:13px;color:#888;background:transparent;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color 0.15s}
.nav-link:hover{color:#fff}
.nav-cta{padding:7px 18px;border-radius:20px;font-size:13px;font-weight:600;color:#000;background:#fff;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity 0.15s}
.nav-secondary{padding:7px 18px;border-radius:20px;font-size:13px;font-weight:600;color:#fff;background:#2a2a2a;border:1px solid #333;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.15s}
.nav-secondary:hover{background:#3a3a3a}
.nav-cta:hover{opacity:0.85}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:#2a2a2a;color:#fff;border:1px solid #333;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center}
.user-menu{display:none;position:absolute;top:42px;right:0;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:8px;min-width:200px;z-index:10001;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
.user-menu.open{display:block}
.user-menu-email{color:#888;font-size:12px;padding:6px 10px 10px;border-bottom:1px solid #2a2a2a;margin-bottom:6px;word-break:break-all;font-family:'DM Sans',sans-serif}
.user-menu-btn{width:100%;text-align:left;padding:9px 10px;border-radius:8px;background:none;border:none;color:#fff;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.15s}
.user-menu-btn:hover{background:#2a2a2a}
.auth-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:10000;display:none;align-items:center;justify-content:center}
.auth-modal{background:#111;border:1px solid #2a2a2a;border-radius:18px;padding:44px 40px;width:420px;max-width:92vw;text-align:center;font-family:'DM Sans',sans-serif}
.auth-modal h3{color:#fff;font-size:26px;margin:0 0 10px}
.auth-modal p{color:#999;font-size:15px;margin:0 0 28px}
.auth-close{position:absolute;top:18px;right:22px;color:#888;background:none;border:none;font-size:22px;cursor:pointer}
.nav-link:hover{color:#fff}
.app{display:flex;flex:1;height:calc(100vh - 52px);margin-top:52px}
.sidebar{width:240px;padding:12px 8px;display:flex;flex-direction:column;gap:2px;border-right:1px solid #1a1a1a;flex-shrink:0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sb-recent-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;font-size:13px;color:#aaa;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:none;border:none;width:100%;text-align:left;transition:background 0.15s,color 0.15s}
.sb-recent-item:hover{background:#1a1a1a;color:#fff}
.sb-recent-item svg{flex-shrink:0;opacity:0.5}
.sb-new{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:15px;color:#888;background:none;border:none;font-family:'DM Sans',sans-serif;width:100%;text-align:left;transition:all 0.15s;margin-bottom:8px}
.sb-new:hover{background:#111;color:#fff}
.sb-section{font-size:12px;color:#555;padding:8px 14px 6px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em}
.sb-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:15px;color:#888;background:none;border:none;font-family:'DM Sans',sans-serif;width:100%;text-align:left;transition:all 0.15s}
.sb-item:hover{background:#111;color:#fff}
.sb-item.active{background:#111;color:#fff}
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;padding:40px 24px 140px;text-align:center;overflow-y:auto}
.welcome-top{display:flex;flex-direction:column;align-items:center;margin-bottom:24px}
.welcome h1{font-size:clamp(26px,4vw,38px);font-weight:500;color:#fff;margin-bottom:10px;letter-spacing:-0.5px}
.welcome-sub{font-size:15px;color:#666}
.preview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:960px;width:100%;margin:0 auto 32px}
.prev-card{background:#111;border:1px solid #222;border-radius:10px;overflow:hidden;cursor:pointer;transition:opacity 0.5s,transform 0.5s,border-color 0.15s;text-decoration:none;display:block;color:inherit;position:relative}
.prev-card:hover{border-color:#444;transform:translateY(-1px)}
.prev-card.fade-out{opacity:0;transform:translateY(6px)}
.prev-card-img{width:100%;height:110px;object-fit:cover;display:block;background:#1a1a1a}
.prev-card-ph{width:100%;height:110px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:24px}
.prev-card-body{padding:7px 10px 8px}
.prev-card-title{font-size:11px;color:#aaa;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prev-card-price{font-size:16px;font-weight:800;color:#fff}
/* source logo row */
.prev-card-source{display:flex;align-items:center;gap:4px;margin-bottom:4px}
/* eBay inline logo */
.ebay-logo{font-size:13px;font-family:Arial,sans-serif;font-weight:900;letter-spacing:-0.3px;line-height:1}
/* AliExpress logo */
.ali-logo{font-size:10px;font-weight:800;color:#ff4747;font-family:'DM Sans',sans-serif;letter-spacing:-0.2px}
/* AliExpress card highlight border */
.prev-card.ali-card{border-color:#2a1a1a}
.prev-card.ali-card:hover{border-color:#ff4747}

/* messages */
.messages{flex:1;overflow-y:auto;padding:24px 32px 170px;display:flex;flex-direction:column;gap:20px;width:100%;align-self:stretch}
.messages-inner{max-width:1100px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:20px;flex:1}
.msg{display:flex;gap:12px;width:100%;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.msg-av.u{background:#fff;color:#000;border:1px solid #e0e0e0}
.msg-av.a{background:#fff;border:1px solid #e0e0e0;position:relative}
.msg-av.a::after{content:'';position:absolute;width:10px;height:10px;border-radius:50%;background:#000}
.msg-body{max-width:calc(100% - 44px);font-size:14px;line-height:1.65;color:#e5e5e5;padding:12px 16px;border-radius:12px;background:#111;border:1px solid #222}
.msg.assistant .msg-body{max-width:100%;width:100%;background:transparent;border:none;padding:0 2px}
.msg.user .msg-body{background:#fff;color:#000;border-color:#e0e0e0}
.chat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px;width:100%;align-items:stretch}
.chat-card{background:#111;border:1px solid #222;border-radius:10px;overflow:hidden;text-decoration:none;display:flex;flex-direction:column;color:inherit;transition:border-color 0.15s,transform 0.15s;height:100%}
.chat-card:hover{border-color:#444;transform:translateY(-2px)}
.chat-card-img{width:100%;height:160px;object-fit:cover;display:block;background:#1a1a1a}
.chat-card-ph{width:100%;height:160px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:32px}
.chat-card-body{padding:10px 12px;flex:1;display:flex;flex-direction:column}
.chat-card-title{font-size:12px;color:#ddd;margin-bottom:6px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.8em}
.chat-card-price{font-size:17px;font-weight:800;color:#fff;letter-spacing:-0.3px}
.chat-card-loc{font-size:10px;color:#999;margin-top:3px}
.card-btns{display:flex;gap:4px;margin-top:8px}
.card-btn{flex:1;background:#fff;color:#1c1c1c;border:none;border-radius:7px;padding:7px 2px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap;text-decoration:none;transition:opacity .15s}
.card-btn:hover{opacity:.85}
.card-btn .vshield{width:13px;height:13px;flex-shrink:0}
.fa-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:20000;display:none;align-items:flex-end;justify-content:center}
.fa-modal-bg.open{display:flex}
.fa-modal{background:#1c1c1c;border-top-left-radius:18px;border-top-right-radius:18px;border:1px solid #2a2a2a;width:100%;max-width:460px;max-height:86vh;overflow-y:auto;padding:22px 20px calc(26px + env(safe-area-inset-bottom));font-family:'DM Sans',sans-serif;animation:faUp .28s ease}
@keyframes faUp{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
.fa-close{float:right;background:none;border:none;color:#888;font-size:24px;cursor:pointer;line-height:1}
@media(max-width:700px){.card-btn{font-size:9px;padding:6px 1px;gap:2px}.card-btns{gap:3px}.card-btn .vshield{width:11px;height:11px}}

.thinking{display:flex;gap:5px;padding:12px 16px;background:#111;border:1px solid #222;border-radius:12px;width:fit-content}
.thinking span{width:7px;height:7px;background:#444;border-radius:50%;animation:bounce 1.2s infinite}
.thinking span:nth-child(2){animation-delay:0.2s}
.thinking span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
.input-area{padding:12px 24px calc(20px + env(safe-area-inset-bottom));background:#000;position:fixed;bottom:0;left:240px;right:0;z-index:1000;border-top:1px solid #1a1a1a}
.input-wrap{max-width:820px;margin:0 auto;background:#1a1a1a;border:1.5px solid #333;border-radius:20px;display:flex;align-items:flex-end;gap:8px;padding:20px 16px 20px 24px;transition:border-color 0.2s,box-shadow 0.2s;box-shadow:0 4px 32px rgba(0,0,0,0.6)}
.input-wrap:focus-within{border-color:#555;box-shadow:0 4px 40px rgba(255,255,255,0.08)}
/* Full-window drag-and-drop overlay */
#drop-overlay{position:fixed;inset:0;z-index:100000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.82);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);pointer-events:none}
#drop-overlay.show{display:flex}
#drop-overlay .drop-card{display:flex;flex-direction:column;align-items:center;gap:16px;padding:48px 72px;border:2px dashed #1a6fff;border-radius:24px;background:rgba(26,111,255,0.06)}
#drop-overlay .drop-logo{width:72px;height:72px;border-radius:18px}
#drop-overlay .drop-title{font-size:26px;font-weight:600;color:#fff;letter-spacing:-0.3px}
#drop-overlay .drop-sub{font-size:14px;color:#888}
@media(max-width:700px){#drop-overlay .drop-card{padding:36px 32px}#drop-overlay .drop-title{font-size:20px}}
.chat-in{flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:16px;resize:none;max-height:120px;min-height:28px;line-height:1.6;caret-color:#fff}
.chat-in::placeholder{color:#888;font-size:16px}
.send-btn{width:34px;height:34px;border-radius:8px;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s}
.send-btn:hover{background:#e0e0e0}
.send-btn:disabled{background:#222;cursor:not-allowed}
.plus-wrap{position:relative;flex-shrink:0;display:flex}
.plus-btn{width:34px;height:34px;border-radius:8px;background:#fff;border:none;color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.plus-btn:hover{background:#e0e0e0}
.plus-btn:disabled{background:#222;color:#666;cursor:not-allowed}
.plus-menu{position:absolute;bottom:46px;left:0;background:#1c1c1c;border:1px solid #333;border-radius:12px;padding:6px;display:none;box-shadow:0 8px 28px rgba(0,0,0,.55);z-index:1100;min-width:160px}
.plus-menu.open{display:block}
.plus-menu button{width:100%;background:transparent;border:none;color:#eee;font-family:inherit;font-size:14px;text-align:left;padding:9px 11px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:9px;white-space:nowrap}
.plus-menu button:hover{background:#2a2a2a}
.img-preview{max-width:820px;margin:0 auto 8px;display:none}
.img-preview.show{display:block}
.img-preview .chip{position:relative;display:inline-block;background:transparent;border:none;border-radius:0;padding:4px 6px 0}
.img-preview img{width:96px;height:96px;object-fit:cover;border-radius:14px;display:block;border:1px solid #333}
.img-preview .rm{position:absolute;top:-2px;right:0;background:#333;border:2px solid #000;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0}
.img-preview .rm:hover{background:#555}
.skel{background:linear-gradient(90deg,#111 25%,#1a1a1a 50%,#111 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#222;border-radius:3px}
#brand-bar{display:none}
/* ===== EXPERIMENT: ambient background + centered welcome ===== */
/* Ambient layer fills the chat pane, sits behind content */
#ambient-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.ambient-card{position:absolute;width:150px;border-radius:10px;overflow:hidden;opacity:0;transition:opacity 1.6s ease;box-shadow:0 8px 30px rgba(0,0,0,0.55);border:1px solid #222;background:#111;pointer-events:auto;cursor:pointer;text-decoration:none;color:inherit;display:block}
.ambient-card.show{opacity:0.85}
.ambient-card:hover{opacity:1;border-color:#444;transition:opacity 0.2s ease}
.ambient-card img{width:100%;height:150px;object-fit:cover;display:block;background:#1a1a1a}
.ambient-card .ac-meta{position:relative;padding:6px 8px;display:flex;align-items:center;justify-content:center;min-height:28px}
.ambient-card .ac-meta .ebay-logo,.ambient-card .ac-meta .ali-logo{position:absolute;left:8px;top:50%;transform:translateY(-50%)}
.ambient-card .ac-price{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:800;color:#fff;letter-spacing:-0.3px}
.ambient-card .ebay-logo{font-size:12px}
.ambient-card .ali-logo{font-size:9px}
/* When in EXPERIMENT welcome mode, center the title + search vertically */
.chat.exp-welcome{justify-content:center;align-items:center;position:relative}
.chat.exp-welcome .welcome{position:relative;z-index:2;flex:none;padding:0;overflow:visible;background:transparent}
.chat.exp-welcome #preview-grid{display:none}
.chat.exp-welcome .welcome-top{margin-bottom:28px}
.chat.exp-welcome .welcome h1{font-size:clamp(30px,5vw,46px)}
/* float the input area centered, just under the title, instead of pinned bottom */
.chat.exp-welcome .input-area{position:relative;left:0;right:0;bottom:auto;background:transparent;border-top:none;z-index:2;width:100%;padding-top:0}
@media(max-width:700px){
  #ambient-bg{display:none}
  .ambient-card{width:96px}
  .ambient-card img{height:96px}
}
@media(max-width:700px){
  .sidebar{display:none}
  nav{position:fixed;top:0;left:0;right:0;height:52px;z-index:9999;background:#000;border-bottom:1px solid #1a1a1a}
  .nav-logo{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:28px}
  .nav-links{display:none}
  /* logged-out: show only Log in, pinned right, as a white box */
  #nav-auth-out{display:flex;position:absolute;right:12px;top:50%;transform:translateY(-50%)}
  #nav-auth-out .nav-cta{display:none}
  #nav-auth-out .nav-secondary{display:inline-flex;background:#fff;color:#000;border:none;font-weight:600}
  /* logged-in: show avatar, pinned right */
  #nav-auth-in{display:none;position:absolute;right:12px;top:50%;transform:translateY(-50%)}
  .app{height:calc(100dvh - 52px);margin-top:52px}
  .chat{height:calc(100dvh - 52px);overflow:hidden;display:flex;flex-direction:column}
  .messages{flex:1;overflow-y:auto;padding:12px 4px 300px;-webkit-overflow-scrolling:touch}
  .input-area{position:fixed;left:0;right:0;bottom:calc(120px + env(safe-area-inset-bottom));z-index:9999;padding:8px 8px;background:#000;border-top:1px solid #1a1a1a}
  #brand-bar{display:flex;align-items:center;justify-content:center;gap:9px;position:fixed;bottom:0;left:0;right:0;height:calc(120px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:#000;z-index:9998;border-top:1px solid #1a1a1a}
  #brand-bar img{width:30px;height:30px;border-radius:7px}
  #brand-bar span{font-size:19px;font-weight:700;color:#fff;letter-spacing:-0.3px}
  .welcome{padding-top:8px;padding-bottom:290px;overflow-y:auto;justify-content:flex-start}
  .welcome-sub{display:none}
  .welcome h1{font-size:24px;margin-bottom:6px}
  .welcome-top{margin-bottom:10px}
  .chat-grid{grid-template-columns:repeat(3,1fr);gap:3px;width:100%}
  .preview-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .prev-card-img{height:100px}
  .prev-card-ph{height:100px}
  .prev-card-body{padding:5px 7px}
  .prev-card-title{font-size:10px}
  .prev-card-price{font-size:14px}
  .chat-card{border-radius:6px}
  .chat-card-img{height:130px}
  .chat-card-ph{height:130px}
  .chat-card-body{padding:5px 6px}
  .chat-card-title{font-size:10px;-webkit-line-clamp:2}
  .chat-card-price{font-size:12px;font-weight:800}
  .chat-card-loc{display:none}
  .msg{gap:4px}
  .msg-av{width:20px;height:20px;flex-shrink:0}
  .msg-av.a{display:none}
  .msg.assistant{gap:0}
  .msg.user .msg-body{margin-top:8px}
  .msg-body{max-width:100%!important;padding:8px 6px;border-radius:8px}
  .messages-inner{max-width:100%;width:100%}
}
</style>

<body>
<nav>
  <span class="nav-logo" onclick="resetChat()">FindAI</span>
  <div class="nav-links" id="nav-auth-out">
    <button class="nav-secondary" onclick="openAuth('Welcome back')">Log in</button>
    <button class="nav-cta" onclick="openAuth('Create your free account')">Sign up for free</button>

// Ensure the Verify modal element exists once.
function ensureVerifyModal(){

function closeVerify(){ var bg=document.getElementById('fa-modal-bg'); if(bg) bg.classList.remove('open'); }
// Call the worker Trust Score engine and show the result in a slide-up modal.
async function runVerify(btn, itemId){
  if(!itemId){ return; }
  ensureVerifyModal();
  var bg=document.getElementById('fa-modal-bg'), modal=document.getElementById('fa-modal');
  bg.classList.add('open');
  // staged loading
  modal.innerHTML='<button class="fa-close" onclick="closeVerify()">&times;</button>'+
    '<div style="text-align:center;padding:34px 10px">'+
    faVerifyShield().replace('vshield','').replace('width:13px;height:13px','')+
    '<div id="fa-stage" style="color:#fff;font-size:16px;font-weight:600;margin-top:14px">Analyzing seller…</div>'+
    '<div style="color:#777;font-size:12px;margin-top:6px">FindAI Verify</div></div>';
  var stages=['Analyzing seller…','Analyzing price…','Analyzing listing…','Generating Trust Score…'];
  var si=0; var st=setInterval(function(){ si++; var el=document.getElementById('fa-stage'); if(el&&stages[si]) el.textContent=stages[si]; }, 650);
  try{
    var res=await fetch(WORKER+'/?trustscore=1&itemId='+encodeURIComponent(itemId));
    var d=await res.json();
    clearInterval(st);
    if(d.error){ modal.innerHTML='<button class="fa-close" onclick="closeVerify()">&times;</button><div style="color:#fff;padding:24px;text-align:center">Could not analyze this listing right now.<div style="color:#777;font-size:12px;margin-top:8px">'+escapeHtml(String(d.error)).slice(0,140)+'</div></div>'; return; }
    var score=d.trustScore, band=d.riskBand||'';

    var pos=(d.positives||[]).map(function(p){ return '<div style="display:flex;gap:8px;align-items:flex-start;margin:6px 0;color:#cfe9df;font-size:13px"><span style="color:#5DCAA5">✓</span><span>'+escapeHtml(p)+'</span></div>'; }).join('');

    var agStatus=d.authenticityStatus||'';

      agHtml='<div style="background:#0f2e25;border:1px solid #14543f;color:#7fe0c0;border-radius:9px;padding:9px 12px;font-size:13px;margin:12px 0;display:flex;gap:8px;align-items:center">'+faVerifyShield()+' eBay Authenticity Guarantee. eBay verifies before delivery</div>';
    } else if(agStatus==='NotAvailable'){
      // Only shown for categories eBay CAN verify (e.g. sneakers) where this listing isn't covered.
      agHtml='<div style="background:#2a2410;border:1px solid #4a3f12;color:#e0c074;border-radius:9px;padding:9px 12px;font-size:12px;margin:12px 0">eBay Authenticity Guarantee: not available for this listing</div>';
    }
    // (For categories eBay never verifies, agStatus is NotApplicable → no line shown.)
    modal.innerHTML='<button class="fa-close" onclick="closeVerify()">&times;</button>'+
      '<div style="text-align:center;margin-bottom:6px"><div style="color:#888;font-size:12px;letter-spacing:.04em">FINDAI TRUST SCORE</div>'+
      '<div style="font-size:46px;font-weight:700;color:'+bandColor+';line-height:1.1;margin-top:2px">'+score+'<span style="font-size:20px;color:#666">/100</span></div>'+
      '<div style="color:'+bandColor+';font-size:14px;font-weight:600">'+escapeHtml(band)+'</div></div>'+
      agHtml+
      (pos?'<div style="color:#fff;font-size:13px;font-weight:600;margin:14px 0 2px">Positive signals</div>'+pos:'')+
      (flags?'<div style="color:#fff;font-size:13px;font-weight:600;margin:14px 0 2px">Risk flags</div>'+flags:'')+
      '<div style="color:#666;font-size:11px;line-height:1.5;margin-top:16px;border-top:1px solid #2a2a2a;padding-top:12px">'+escapeHtml(d.disclaimer||'')+'</div>';
  }catch(e){
    clearInterval(st);
    modal.innerHTML='<button class="fa-close" onclick="closeVerify()">&times;</button><div style="color:#fff;padding:24px;text-align:center">Verify is unavailable right now — please try again.</div>';
  }
}


let busy=false, previewItems=[], previewIdx=0;
let priorityItems=[], priorityIdx=0; // pool of search/clicked items the pinned slots cycle among
let heroPools=[[],[],[],[]], heroIdx=[0,0,0,0], heroTick=0; // MOBILE hero row: 4 category pools that constantly refresh
let conversation=[];
// Remember the last product search so a follow-up like "brand new", "cheaper" or
// "under $50" REFINES it (continues from it) instead of starting a fresh search.
let lastSearchKw='', lastMaxPrice='';
// Words that only MODIFY an existing search (condition, colour, comparative, filler) —
// none of these names a new product on their own.
const REFINE_TOKENS=new Set([
  'new','brand','sealed','unsealed','used','unopened','opened','mint','boxed','unboxed',
  'bnib','nib','genuine','authentic','original','complete','vintage','retro','rare',
  'cheap','cheaper','cheapest','expensive','pricier','dearer','budget',
  'big','bigger','biggest','small','smaller','smallest','large','larger','mini',
  'newer','newest','old','older','oldest','latest','recent',
  'red','orange','yellow','green','blue','navy','teal','turquoise','cyan','purple',
  'violet','magenta','pink','rose','black','white','cream','beige','tan','khaki',
  'brown','grey','gray','gold','silver','bronze','maroon',
  'only','just','please','show','me','the','a','an','some','any','more','ones','one',
  'version','edition','instead','now','make','it','that','these','those','them','with','without','no'
]);
// True when the message is a refinement of the last search (e.g. "brand new", "red ones",
// "under $50") rather than a new product search — so we stitch it onto the previous query.
function isRefinement(q){
  if(!lastSearchKw) return false;                 // nothing to refine yet
  let s=q.toLowerCase()
    .replace(/(?:under|below|max|less than|for less than|up to|no more than|cheaper than|over|above)\s*\$?\s*[0-9,.]+\s*(k|m|thousand|dollars|dollar|usd|aud)?/gi,' ')
    .replace(/\$\s*[0-9,.]+/g,' ')
    .replace(/[^a-z0-9\s]/g,' ')
    .replace(/\s+/g,' ').trim();
  if(!s) return true;                              // message was ONLY a price phrase
  const toks=s.split(' ').filter(Boolean);
  if(toks.length>4) return false;                  // too long to be a simple refinement
  return toks.every(t=> REFINE_TOKENS.has(t) || /^(19|20)\d{2}$/.test(t)); // all modifiers (a year is fine)
}
function escapeHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Scroll so the latest user message sits at the top — called the INSTANT a search is
// submitted (while the 3 dots load) so the view follows immediately, not after results.
function scrollToLastUser(){

  if(!u.length)return;
  // First search: nothing above to scroll past — keep it in place (block:'start' would

function typeReply(bodyEl,replyText,cardsHtml){
  const text=String(replyText||'');
  const p=document.createElement('p');
  p.style.cssText='font-size:15px;color:#f0f0f0;line-height:1.55;margin:0;padding:0 2px;white-space:pre-wrap';
  // Only add the reply paragraph when there's actual text — an empty <p> would
  // push the result heading down and break its alignment with the avatar circle.
  if(text){ p.style.margin = cardsHtml ? '0 0 12px' : '0'; bodyEl.appendChild(p); }
  // Show the result cards IMMEDIATELY — don't wait for the reply to finish typing.
  if(cardsHtml){ const slot=document.createElement('div'); slot.innerHTML=cardsHtml; bodyEl.appendChild(slot); }
  if(!text){ return; }
  let i=0; const step=3, speed=10;
  (function tick(){
    if(i<text.length){ i=Math.min(i+step,text.length); p.textContent=text.slice(0,i); setTimeout(tick,speed); }
    else { p.textContent=text; }
  })();
}

function parseQuery(text){
  const lower=text.toLowerCase();
  let cleaned=lower
    .replace(/^(show me|find me|search for|look for|i want|get me|can you find|find|show|search)\s+/i,'')
    .replace(/\b(a|an|the|some|any)\s+/gi,' ').replace(/\bfor sale\b/gi,'').replace(/\s+/g,' ').trim();
  let maxPrice='';
  const pm=cleaned.match(/(?:under|below|max|less than|for less than|up to|no more than|for)\s*\$?\s*([0-9,.]+)\s*(k|m|thousand|dollars|dollar|usd|aud)?/i);
  if(pm){
    let p=parseFloat(pm[1].replace(/,/g,''));
    const unit=(pm[2]||'').toLowerCase();
    if(unit==='k')p*=1000; if(unit==='m')p*=1000000;
    maxPrice=Math.round(p);
    cleaned=cleaned.replace(/(?:under|below|max|less than|for less than|up to|no more than|for)\s*\$?\s*[0-9,.]+\s*(k|m|thousand|dollars|dollar|usd|aud)?/i,'');
  }
  cleaned=cleaned.replace(/\b(dollars|dollar|usd|aud|less|than)\b/gi,'').replace(/\s+/g,' ').trim();
  let c=country;
  if(lower.match(/\b(australia|australian|aus|in au)\b/))c='AU';
  else if(lower.match(/\b(united states|america|american|in us|in the us|from us|from the us|usa)\b/))c='US';
  else if(lower.match(/\b(united kingdom|england|english|in uk|in the uk|from uk|britain|british)\b/))c='UK';
  else if(lower.match(/\b(germany|german|deutschland|in germany)\b/))c='DE';
  return{q:cleaned,maxPrice,country:c};
}

// Decide if a query is a product search (fast, no AI) or a real question (use the AI).
function isProductSearch(t){
  const s=(t||'').trim().toLowerCase();
  if(/\d\s*[+\-*/^×÷]\s*\d/.test(s) && /^[\d\s+\-*/^×÷=().,]+$/.test(s)) return false;                          // arithmetic like "2+2", "5 * 3"
  if(/\b(square root|sqrt|cube root|divided by|multiplied by|to the power|squared|cubed|percent of|factorial)\b/.test(s)) return false; // worded math
  if(/\b(find|buy|get|looking for|search for|need|want|show me|locate|source|cop|grab)\b/.test(s)) return true; // explicit shopping
  if(s.includes('?')) return false;                                                                           // a question
  if(/^((what|why|how|who|whom|when|where|which)('?s)?|is|are|am|was|were|can|could|would|should|do|does|did|will|tell me|explain|help|define|calculate|hi|hello|hey|thanks|thank|ok|okay)\b/.test(s)) return false; // chit-chat / question
  return true;                                                                                                  // default on a shopping tool → product search
}

const PAGE_SIZE=16; let searchCount=0; const searchStates={};
// How many results to load per batch. Mobile shows MORE up front (and per "Show more")

function pageSize(){

// Build an EPN-TRACKED eBay search URL (so "Search for more" still earns commission).
function ebaySearchUrl(query){
  const MKRID={US:'711-53200-19255-0',AU:'705-53470-19255-0',UK:'710-53481-19255-0',DE:'707-53477-19255-0'};
  const DOMAIN={US:'www.ebay.com',AU:'www.ebay.com.au',UK:'www.ebay.co.uk',DE:'www.ebay.de'};
  const c=(country||'US');
  const params=new URLSearchParams({
    _nkw: query||'', mkevt:'1', mkcid:'1',
    mkrid:(MKRID[c]||MKRID.US), campid:'5339155260', toolid:'10001',
    customid:'findai_'+c.toLowerCase()
  });
  return `https://${(DOMAIN[c]||DOMAIN.US)}/sch/i.html?${params.toString()}`;
}

function renderCards(items,label,_m,maxPrice,c,ebayCount,etsyCount,quiet){
  const sym=c==='UK'?'£':c==='DE'?'€':'$';
  if(!items.length) return `<p style="color:#666;font-size:14px;margin-top:8px">No listings found right now. Try a different search.</p>`;
  searchCount++; const sid=searchCount;
  searchStates[sid]={items,shown:Math.min(pageSize(),items.length),query:label};
  const top=items.slice(0,searchStates[sid].shown);
  const totalFound=ebayCount+etsyCount;
  const displayCount=totalFound>0?totalFound:items.length;
  const displayCountFmt=Number(displayCount).toLocaleString();
  let summary='';
  if(label){
    const lc=label.charAt(0).toUpperCase()+label.slice(1);
    summary=`Here's what I found for <strong>${lc}</strong>`;
    if(maxPrice)summary+=` under ${sym}${Number(maxPrice).toLocaleString()}`;
    summary+=` <span style="color:#666;font-size:12px">(${displayCountFmt} listings)</span>`;
  }else{
    summary=`Found <strong>${displayCountFmt} listing${displayCount!==1?'s':''}</strong>`;
    if(maxPrice)summary+=` under ${sym}${Number(maxPrice).toLocaleString()}`;
  }
  if(quiet)summary='';
  const cards=top.map(item=>{
    const price=item.price?`${sym}${Number(item.price).toLocaleString()}`:'See listing';
    const isAli=item.source==='AliExpress';
    const srcBadge=isAli
      ?`<span style="font-size:11px;font-weight:800;color:#ff4747;font-family:'DM Sans',sans-serif">AliExpress</span>`
      :ebayLogoHtml();
    const _imgSize=(typeof window!=='undefined'&&window.innerWidth&&window.innerWidth<600)?'s-l300':'s-l500';
    const imgSrc=item.image&&!isAli?item.image.replace(/s-l\d+\./,_imgSize+'.'):item.image;
    const _hasOffer=Array.isArray(item.buyingOptions)&&item.buyingOptions.indexOf('BEST_OFFER')!==-1;
    const _btns=cardButtonsHtml(item.url, _hasOffer, item.itemId, isAli);
    return `<div class="chat-card" data-q="${escapeHtml(label||'')}" data-item="${escapeHtml(JSON.stringify({title:item.title,image:item.image,price:item.price,url:item.url,itemId:item.itemId,source:item.source,country:c,searchQ:label}))}"><a href="${item.url}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;display:flex;flex-direction:column;flex:1">${imgSrc?`<img class="chat-card-img" src="${imgSrc}" alt="" loading="lazy" onerror="this.parentNode.querySelector('.chat-card-ph')&&(this.style.display='none')">`:`<div class="chat-card-ph">🛍️</div>`}<div class="chat-card-body"><div style="margin-bottom:5px">${srcBadge}</div><div class="chat-card-title">${item.title||''}</div><div class="chat-card-price">${price}</div><div class="chat-card-loc">${item.location||''}</div></div></a><div style="padding:0 12px 12px">${_btns}</div></div>`;
  }).join('');

}

let pendingImage=null;
async function sendMsg(){
  const inp=document.getElementById('chat-in');
  const q=inp.value.trim();
  if(busy)return;
  if(pendingImage){
    const img=pendingImage, txt=q;
    clearPendingImage();
    inp.value=''; inp.style.height='auto';
    sendImageMessage(img, txt);
    return;
  }
  if(!q)return;
  saveRecentSearch(q);
  noteInterest(q, false);
  busy=true; document.getElementById('send-btn').disabled=true;
  inp.value=''; inp.style.height='auto';
  showChat(); addMsg('user',escapeHtml(q)); addThinking();
  requestAnimationFrame(scrollToLastUser);          // follow the search down NOW, while the dots load
  conversation.push({role:'user',content:q});

  // ⚡ FAST PATH: a product search skips the AI entirely and hits the cached search directly.
  if(isProductSearch(q)){
    try{
      let kw, maxPrice;
      if(isRefinement(q)){
        // Continue from the previous search: "lego harry potter 2001" + "brand new"
        // → "lego harry potter 2001 brand new". A new price overrides; otherwise keep the old one.
        const ref=parseQuery(q);
        kw=(lastSearchKw+' '+(ref.q||'')).replace(/\s+/g,' ').trim();
        maxPrice=ref.maxPrice||lastMaxPrice||'';
      }else{
        const parsed=parseQuery(q);
        kw=parsed.q||q;
        maxPrice=parsed.maxPrice||'';
      }
      lastSearchKw=kw; lastMaxPrice=maxPrice;       // remember so the NEXT message can refine this
      const res=await fetch(`${WORKER}/?q=${encodeURIComponent(kw)}&maxPrice=${encodeURIComponent(maxPrice||'')}`);
      const data=await res.json();
      removeThinking();
      const c=data.country||country;
      const items=Array.isArray(data.items)?data.items:[];
      saveSearchedItems(items, kw);
      const cardsHtml=items.length?renderCards(items,kw,'',maxPrice||'',c,data.ebayCount||0,0,false):'';
      conversation.push({role:'assistant',content:'(showed results for '+kw+')'});
      const body=addMsg('assistant','');
      typeReply(body, items.length?'':"Couldn't find that one — try different words?", cardsHtml);
      setTimeout(scrollToLastUser,150);
    }catch(e){removeThinking();addMsg('assistant','Sorry, the search hiccupped — try again?');}
    busy=false; document.getElementById('send-btn').disabled=false; inp.focus();
    return;
  }

  try{
    const res=await fetch(`${WORKER}/?chat=1`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:conversation.slice(-6)})
    });
    const data=await res.json();
    removeThinking();
    const reply=(data.reply||'').trim();
    conversation.push({role:'assistant',content:reply});
    const c=data.country||country;
    const hasItems=Array.isArray(data.items)&&data.items.length>0;
    let cardsHtml='';
    if(hasItems){
      const lbl=(data.search&&data.search.query)||q;
      const mp=(data.search&&data.search.maxPrice)||'';
      lastSearchKw=lbl; lastMaxPrice=mp||'';        // let the next message refine this search too
      saveSearchedItems(data.items, lbl);
      cardsHtml=renderCards(data.items,lbl,'',mp,c,(data.meta&&data.meta.ebayCount)||0,(data.meta&&data.meta.etsyCount)||0,true);
    }
    const body=addMsg('assistant','');
    typeReply(body, reply||(hasItems?'':"Hmm, I didn't catch that — want to try rephrasing?"), cardsHtml);
    setTimeout(scrollToLastUser,150);
  }catch(e){removeThinking();addMsg('assistant','Sorry, I had trouble just now. Please try again.');}
  busy=false; document.getElementById('send-btn').disabled=false; inp.focus();
}

// Shared image handler — used by BOTH the "Upload file" picker and drag-and-drop.
function handleImageFile(file){
  if(!file||busy)return;
  if(file.type&&!/^image\//.test(file.type)){ // dropped a non-image (pdf, doc, etc.)
    showChat();
    addMsg('assistant','That looks like a non-image file — FindAI searches from a photo, so drop a JPG, PNG or screenshot of the item.');
    return;
  }
  resizeImage(file,512,0.72).then(function(dataUrl){
    pendingImage=dataUrl;

    if(pv){pv.innerHTML=`<span class="chip"><img src="${dataUrl}" alt="attached"><button class="rm" onclick="clearPendingImage()" title="Remove" aria-label="Remove">&times;</button></span>`;pv.classList.add('show');}

  }).catch(function(){addMsg('assistant','Could not read that image — try another.');});
}

function resizeImage(file,maxDim,quality){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error('read'));
    reader.onload=()=>{
      const img=new Image();
      img.onerror=()=>reject(new Error('img'));
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
        else if(h>=w&&h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── FEATURED ALIEXPRESS ITEMS (homepage) ──────────────────────────────────
// Two featured slots: slot 0 = Pop Mart / Labubu, slot 1 = a second category.
// We fetch a POOL for each from the worker's ?home=1, cache it, and rotate
// through it client-side so the two cards refresh INDEPENDENTLY (not in sync)
// and move around the grid — without hammering the API.
let aliPools = { popmart: [], other: [] };

function tagAli(i){ return { ...i, source: 'AliExpress', _isAli: true, country: 'AU' }; }

async function fetchAliPools() {
  try {
    const res = await fetch(`${WORKER}/?home=1`, { cache: 'no-store' });
    const data = await res.json();
    aliPools.popmart = (data.popmart || []).filter(i => i.image && i.url).map(tagAli);
    aliPools.other   = (data.other   || []).filter(i => i.image && i.url).map(tagAli);
    // Fallback if the worker only returned the 2-item "items" array
    if (!aliPools.popmart.length && !aliPools.other.length) {
      const items = (data.items || []).filter(i => i.image && i.url).map(tagAli);
      aliPools.popmart = items.slice(0, 1);
      aliPools.other   = items.slice(1, 2);
    }
  } catch (_) {}
}

// Pick a random item from a slot's pool, avoiding the one currently shown
function pickAli(slot, excludeId) {
  const pool = slot === 0 ? aliPools.popmart : aliPools.other;
  if (!pool.length) return null;
  const avail = pool.filter(i => String(i.itemId) !== String(excludeId));
  const arr = avail.length ? avail : pool;
  return arr[Math.floor(Math.random() * arr.length)];
}

// Swap two sibling DOM elements' positions
function swapElements(a, b) {
  const aParent = a.parentNode;
  const aNext = (a.nextSibling === b) ? a : a.nextSibling;
  b.parentNode.insertBefore(a, b);
  aParent.insertBefore(b, aNext);
}

// ── User interest tracking (searches + clicks) → personalised homepage ──
function noteInterest(q, strong){
  q=(q||'').trim(); if(q.length<2) return;
  let list=[];
  try{ list=JSON.parse(localStorage.getItem('findai_interests')||'[]'); }catch(_){}
  const key=q.toLowerCase();
  const entry=list.find(e=>(e.q||'').toLowerCase()===key);
  if(entry){ entry.score=(entry.score||0)+(strong?3:1); entry.q=q; entry.t=Date.now(); }
  else{ list.push({q, score:(strong?3:1), t:Date.now()}); }
  list.sort((a,b)=> (b.score-a.score) || (b.t-a.t)); // strongest, then most recent
  list=list.slice(0,12);
  try{ localStorage.setItem('findai_interests', JSON.stringify(list)); }catch(_){}
}

// Persist the actual ITEMS from every search so they STAY on the homepage and cycle
// among each other (instead of vanishing once the search drops off the recent list).
// We keep a DEEP pool per search (up to 30 items) so the ambient wall can rotate through
// many distinct listings — 4 fresh, then 4 more, etc. — instead of repeating a handful.
function saveSearchedItems(items, q){
  if(!Array.isArray(items)||!items.length) return;
  let list=[]; try{ list=JSON.parse(localStorage.getItem('findai_searched')||'[]'); }catch(_){}
  const picks=items.filter(i=>i&&i.url&&i.image&&i.source==='eBay')
    .slice(0,30).map(i=>({title:i.title,image:i.image,price:i.price,url:i.url,itemId:i.itemId,source:i.source,searchQ:q||''}));
  if(!picks.length) return;
  const urls=new Set(picks.map(p=>p.url));
  list=list.filter(x=>x&&!urls.has(x.url));
  list=[...picks, ...list].slice(0,120); // most-recent search first, keep a deep pool to rotate through
  try{ localStorage.setItem('findai_searched', JSON.stringify(list)); }catch(_){}
}
function searchedItems(n){

  return list.slice(0,n).filter(Boolean);
}

let _homeIntervalsSet=false;
async function loadPreviews(){
  const grid=document.getElementById('preview-grid');
  if(!grid)return;
  previewLoadedAll=false;

  // Skeletons
  grid.innerHTML=Array.from({length:INITIAL_CARDS},()=>`
    <div class="prev-card"><div class="skel prev-card-img"></div>
    <div class="prev-card-body">
      <div class="skel" style="height:8px;width:50%;margin-bottom:4px"></div>
      <div class="skel" style="height:9px;width:85%;margin-bottom:4px"></div>
      <div class="skel" style="height:11px;width:35%"></div>
    </div></div>`).join('');

  // The base hype pool comes from ONE edge-cached worker call (?previews=1).
  const shufflePool = a => a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(z=>z[1]);
  const shuffled=[...PREVIEWS].sort(()=>Math.random()-0.5); // still used by the padding + infinite-scroll fetches below

  // Personalise from PERSISTED history: the exact items the user clicked + the items from
  // every search they've done. These STAY on the homepage and cycle among each other —
  // nothing vanishes when a search drops off the recent list. (No live re-fetch = faster.)
  const pinned   = clickedItems(4);   // exact items the user clicked
  const searched = searchedItems(20); // items from past searches (most recent first)

  const [, basePool] = await Promise.all([
    fetchAliPools(),
    fetch(`${WORKER}/?previews=1`).then(r=>r.json()).then(d=>d.items||[]).catch(()=>[]),
  ]);
  const topSearch   = searched;       // persisted searched items (most recent first)
  const otherSearch = [];             // (everything lives in topSearch now)

  // ── HERO ROW (MOBILE ONLY): first 4 cards are fixed, constantly-refreshing premium items:
  // slot0 Rolex Daytona, slot1 Yeezy 350, slot2 Louis Vuitton bag, slot3 Jordan 1.
  // Desktop is left exactly as normal (no hero row, no hero refresh). ──
  const isMobile = (typeof window!=='undefined' && window.innerWidth && window.innerWidth < 600);
  let heroItems=[], heroKeys=new Set();
  if(isMobile){
    const heroPoolFor=(term)=> (basePool||[]).filter(i=> i && i.image && Number(i.price)>=100 && (i.searchQ||'').toLowerCase().includes(term));
    heroPools=[ heroPoolFor('rolex daytona'), heroPoolFor('yeezy'), heroPoolFor('louis vuitton'), heroPoolFor('air jordan 1') ];
    heroIdx=[0,0,0,0];
    heroPools.forEach((pool, slot)=>{ if(pool[0]) heroItems.push({ ...pool[0], _heroSlot: slot }); });
    heroKeys = new Set(heroItems.map(i=>String(i.itemId||i.url)));
  } else {
    heroPools=[[],[],[],[]]; // desktop → no hero row, refresh no-ops
  }

  // PRIORITY pool = the exact clicked items + recent-search items (deduped, minus hero).
  const prioritySeen=new Set(), prioritySeenT=new Set(), priorityPool=[];
  for(const i of [...pinned, ...topSearch, ...otherSearch]){
    if(!i||!i.itemId||!i.image||heroKeys.has(String(i.itemId))) continue;
    const t=(i.title||'').substring(0,30).toLowerCase();
    if(prioritySeen.has(i.itemId)||prioritySeenT.has(t)) continue;
    prioritySeen.add(i.itemId); prioritySeenT.add(t); priorityPool.push(i);
  }
  const PRIORITY_VISIBLE = Math.min(4, priorityPool.length);
  const visiblePriority = priorityPool.slice(0, PRIORITY_VISIBLE);
  // HYPE pool = the base wall minus hero AND priority (no dupes).
  const hype = (basePool||[]).filter(i=> i && i.itemId && !prioritySeen.has(i.itemId) && !heroKeys.has(String(i.itemId)));
  // Mobile: hero row first, then personalised cluster, then hype. Desktop: personalised + hype (NORMAL).
  const ebayItems = [...heroItems, ...visiblePriority, ...shufflePool(hype)];
  const protectedKeys = new Set(visiblePriority.map(i=>String(i.itemId||i.url)));
  priorityItems = priorityPool; priorityIdx = PRIORITY_VISIBLE;

  // Deduplicate eBay by itemId AND title (catch same item with different IDs)
  const seen = new Set();
  const seenTitles = new Set();
  const unique = ebayItems.filter(i => {
    if (!i.itemId || seen.has(i.itemId)) return false;
    // Also dedupe by first 30 chars of title
    const titleKey = (i.title||'').substring(0,30).toLowerCase();
    if (seenTitles.has(titleKey)) return false;
    seen.add(i.itemId);
    seenTitles.add(titleKey);
    return true;
  });

  // Pad the eBay pool with more fetches if needed
  let ebayUnique = unique.slice(0);
  if (ebayUnique.length < INITIAL_CARDS) {
    const extra = await fetchPreviewBatch(shuffled.slice(16, 24));
    const extraUnique = extra.filter(i => i.itemId && !seen.has(i.itemId));
    extraUnique.forEach(i => seen.add(i.itemId));
    ebayUnique = [...ebayUnique, ...extraUnique];
  }

  // eBay pool drives the general (hype) rotation — exclude priority items, reset each build.
  previewItems.length = 0;
  previewItems.push(...ebayUnique.filter(i=>!prioritySeen.has(i.itemId)));

  // Build grid: eBay ALWAYS fills the first 3 slots; ONE AliExpress featured item
  // (slot 0 = Labubu) gets inserted at a RANDOM position after slot 3 — looks organic.
  // (Slot 1 removed → that spot is now just an eBay listing.)
  const aliPicks = [];
  const p0 = pickAli(0); if (p0) aliPicks.push({ item: p0, slot: 0 });

  const ebayNeeded = Math.max(0, INITIAL_CARDS - aliPicks.length);
  const firstScreen = ebayUnique.slice(0, ebayNeeded).map(it => ({ it, slot: null }));
  aliPicks.forEach(p => {
    const minPos = Math.min(isMobile?4:3, firstScreen.length); // mobile: keep Labubu out of the hero row; desktop: normal
    const maxPos = firstScreen.length;
    const pos = Math.floor(Math.random() * (maxPos - minPos + 1)) + minPos;
    firstScreen.splice(pos, 0, { it: p.item, slot: p.slot });
  });
  if(!firstScreen.length){grid.innerHTML='';return;}
  grid.innerHTML=firstScreen.map(o => buildPrevCard(o.it)).join('');

  // Tag the AliExpress cards with their slot so each refreshes from the right pool
  const cardEls = Array.from(grid.children);
  firstScreen.forEach((o, idx) => {
    if (!cardEls[idx]) return;
    if (o.slot !== null) cardEls[idx].setAttribute('data-ali-slot', String(o.slot));
    else if (o.it && o.it._heroSlot!==undefined){ cardEls[idx].setAttribute('data-hero','1'); cardEls[idx].setAttribute('data-hero-slot', String(o.it._heroSlot)); }
    else if (o.it && protectedKeys.has(String(o.it.itemId||o.it.url))) cardEls[idx].setAttribute('data-pinned','1');
  });

  previewIdx=ebayNeeded;

  if(!_homeIntervalsSet){
  _homeIntervalsSet=true;
  setInterval(rotatePrev, 6500);                 // rotate the eBay (hype) cards
  setInterval(rotatePriority, 9000);             // refresh the pinned cards AMONG priority items
  setInterval(rotateHero, 2500);                 // MOBILE: constantly refresh the 4 hero slots (no-op on desktop)
  // Refresh the single AliExpress card (slot 0 = Labubu) on its own interval.
  if (grid.querySelector('.prev-card.ali-card[data-ali-slot="0"]')) setTimeout(() => setInterval(refreshAliCard(0), 16000),  4000);
  setInterval(fetchAliPools, 180000);            // refresh the pools every 3 min

  // Infinite scroll — eBay only for extra rows
  const welcome=document.getElementById('welcome');
  if(welcome){
    welcome.addEventListener('scroll',async()=>{
      if(previewLoadingMore||previewLoadedAll)return;
      if(welcome.scrollHeight-welcome.scrollTop-welcome.clientHeight<300){
        previewLoadingMore=true;
        const skelRow=document.createElement('div');
        skelRow.id='skel-row'; skelRow.style.cssText='display:contents';
        skelRow.innerHTML=Array.from({length:CARDS_PER_ROW},()=>`
          <div class="prev-card"><div class="skel prev-card-img"></div>
          <div class="prev-card-body">
            <div class="skel" style="height:8px;width:50%;margin-bottom:4px"></div>
            <div class="skel" style="height:9px;width:85%;margin-bottom:4px"></div>
            <div class="skel" style="height:11px;width:35%"></div>
          </div></div>`).join('');
        grid.appendChild(skelRow);
        const nextBatch=[...PREVIEWS].sort(()=>Math.random()-0.5).slice(0,CARDS_PER_ROW*2);
        const newItems=await fetchPreviewBatch(nextBatch);
        const sr=document.getElementById('skel-row');
        if(sr)sr.remove();
        if(newItems.length){
          newItems.forEach(item=>{
            const tmp=document.createElement('div');
            tmp.innerHTML=buildPrevCard(item);
            grid.appendChild(tmp.firstElementChild);
          });
          previewItems.push(...newItems);
        }else previewLoadedAll=true;
        previewLoadingMore=false;
      }
    });
  }
  } // end one-time interval/listener setup
}

function buildPrevCard(item){
  const sym=item.country==='UK'?'£':item.country==='DE'?'€':'$';
  const price=item.price?`${sym}${Number(item.price).toLocaleString()}`:'';
  const title=(item.title||'').substring(0,38)+((item.title||'').length>38?'…':'');
  const isAli=item._isAli||item.source==='AliExpress';
  // Grid tiles are small — load a light thumbnail (eBay s-l300) instead of the full image → faster.
  const thumb = (item.image && !isAli) ? item.image.replace(/s-l\d+\./,'s-l300.') : item.image;
  const sourceLine=isAli
    ?`<div class="prev-card-source">${aliLogoHtml()}</div>`
    :`<div class="prev-card-source">${ebayLogoHtml()}</div>`;
  return `<a class="prev-card${isAli?' ali-card':''}" data-id="${item.itemId||''}" data-title="${(item.title||'').substring(0,30).toLowerCase()}" data-q="${escapeHtml(item.searchQ||'')}" href="${item.url}" target="_blank" rel="noopener">
    ${thumb
      ?`<img class="prev-card-img" src="${thumb}" alt="" loading="lazy" onerror="this.outerHTML='<div class=prev-card-ph>🛍️</div>'">`
      :`<div class="prev-card-ph">🛍️</div>`}
    <div class="prev-card-body">${sourceLine}<div class="prev-card-title">${title}</div><div class="prev-card-price">${price}</div></div>
  </a>`;
}

function rotateHero(){
  // MOBILE hero row: each slot constantly refreshes through different listings of ITS item.
  const grid=document.getElementById('preview-grid'); if(!grid) return;
  const slot=heroTick%4; heroTick++;
  const pool=heroPools[slot]; if(!pool||pool.length<2) return;
  const card=grid.querySelector('.prev-card[data-hero-slot="'+slot+'"]:not(.fade-out)');
  if(!card) return;
  heroIdx[slot]=(heroIdx[slot]+1)%pool.length;
  const item=pool[heroIdx[slot]];
  card.classList.add('fade-out');
  setTimeout(()=>{
    const tmp=document.createElement('div'); tmp.innerHTML=buildPrevCard(item);
    const nc=tmp.firstElementChild;
    nc.setAttribute('data-hero','1'); nc.setAttribute('data-hero-slot', String(slot));
    card.replaceWith(nc);
  },500);
}

function rotatePriority(){
  if(priorityItems.length < 2) return;
  const grid=document.getElementById('preview-grid'); if(!grid) return;
  const pinnedCards=Array.from(grid.querySelectorAll('.prev-card[data-pinned]:not(.fade-out)'));
  if(!pinnedCards.length) return;
  const visibleIds=new Set(Array.from(grid.querySelectorAll('.prev-card[data-id]')).map(c=>c.dataset.id));
  // Find a priority item that isn't currently on screen.
  let item=null, tries=0;
  while(tries<priorityItems.length){
    const cand=priorityItems[priorityIdx%priorityItems.length];
    priorityIdx++; tries++;
    if(cand && !visibleIds.has(String(cand.itemId))){ item=cand; break; }
  }
  if(!item) return; // nothing fresh in the priority pool right now → leave slots as-is
  const card=pinnedCards[Math.floor(Math.random()*pinnedCards.length)];
  card.classList.add('fade-out');
  setTimeout(()=>{
    const tmp=document.createElement('div');
    tmp.innerHTML=buildPrevCard(item);
    const nc=tmp.firstElementChild;
    nc.setAttribute('data-pinned','1'); // stays a priority slot
    card.replaceWith(nc);
  },500);
}

function rotatePrev(){
  if(previewItems.length<5)return;
  const grid=document.getElementById('preview-grid');
  if(!grid)return;
  const allCards=Array.from(grid.querySelectorAll('.prev-card:not(.fade-out)'));
  if(!allCards.length)return;

  // Get currently visible itemIds to avoid duplicates
  const visibleIds=new Set(Array.from(grid.querySelectorAll('.prev-card[data-id]')).map(c=>c.dataset.id));
  const visibleTitles=new Set(Array.from(grid.querySelectorAll('.prev-card[data-title]')).map(c=>c.dataset.title));

  const rotateable=allCards.slice(0,INITIAL_CARDS).filter(c=>!c.classList.contains('ali-card') && !c.hasAttribute('data-pinned') && !c.hasAttribute('data-hero'));
  if(!rotateable.length)return;
  const card=rotateable[Math.floor(Math.random()*rotateable.length)];
  card.classList.add('fade-out');
  setTimeout(()=>{
    // Find next item that isn't already visible
    let attempts=0, newItem=null;
    while(attempts<previewItems.length){
      const candidate=previewItems[previewIdx%previewItems.length];
      previewIdx++;
      attempts++;
      const candTitle=(candidate.title||'').substring(0,30).toLowerCase();
      if(!visibleIds.has(candidate.itemId)&&!visibleTitles.has(candTitle)){newItem=candidate;break;}
    }
    if(!newItem)newItem=previewItems[previewIdx%previewItems.length];
    const tmp=document.createElement('div');
    tmp.innerHTML=buildPrevCard(newItem);
    card.replaceWith(tmp.firstElementChild);
  },500);
}

// Refresh ONE AliExpress card (by slot): swap in a new item from its pool with a
// fade, then MOVE it to a new random spot (swap with a random eBay card after slot 3).
function refreshAliCard(slot){
  return function(){
    const grid=document.getElementById('preview-grid');
    if(!grid)return;
    const card=grid.querySelector(`.prev-card.ali-card[data-ali-slot="${slot}"]`);
    if(!card)return;
    const item=pickAli(slot, card.getAttribute('data-id'));
    if(!item)return;
    card.classList.add('fade-out');
    setTimeout(()=>{
      const tmp=document.createElement('div');
      tmp.innerHTML=buildPrevCard(item);
      const newCard=tmp.firstElementChild;
      newCard.setAttribute('data-ali-slot', String(slot));
      card.replaceWith(newCard);
      // Move it: swap with a random eBay card sitting after slot 3
      const cards=Array.from(grid.children);
      const candidates=cards.filter((c,i)=>i>=3 && c!==newCard && !c.classList.contains('ali-card') && !c.hasAttribute('data-pinned') && !c.hasAttribute('data-hero'));
      if(candidates.length){
        swapElements(newCard, candidates[Math.floor(Math.random()*candidates.length)]);
      }
    },500);
  };
}

(function setupDragDrop(){
  // Full-window overlay shown while a file is dragged over the page.
  const overlay=document.createElement('div');
  overlay.id='drop-overlay';
  overlay.innerHTML=
    '<div class="drop-card">'+
      '<img src="/icon-192.png" alt="FindAI" class="drop-logo">'+
      '<div class="drop-title">Drop image to search</div>'+
      '<div class="drop-sub">FindAI finds it on Amazon, eBay &amp; AliExpress &middot; JPG, PNG, WEBP</div>'+
    '</div>';
  document.body.appendChild(overlay);

  let depth=0; // enter/leave counter so moving over child elements doesn't flicker the overlay
  const dragHasFiles=e=>{
    const t=e.dataTransfer&&e.dataTransfer.types;
    return !!t&&(Array.prototype.indexOf.call(t,'Files')!==-1);
  };
  const show=()=>overlay.classList.add('show');
  const hide=()=>{depth=0;overlay.classList.remove('show');};

  window.addEventListener('dragenter',e=>{ if(!dragHasFiles(e))return; e.preventDefault(); depth++; show(); });
  window.addEventListener('dragover', e=>{ if(!dragHasFiles(e))return; e.preventDefault(); if(e.dataTransfer)e.dataTransfer.dropEffect='copy'; show(); });
  window.addEventListener('dragleave',e=>{ if(!dragHasFiles(e))return; depth--; if(depth<=0)hide(); });
  window.addEventListener('drop', e=>{
    // Always stop the browser from navigating to a dropped file.
    if(e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files.length) e.preventDefault();
    hide();
    if(!dragHasFiles(e))return;
    const file=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];
    if(file)handleImageFile(file);
  });
})();

<script>
/* ===== EXPERIMENT: centered welcome + ambient floating listings ===== */
(function(){
  const chat = document.querySelector('.chat');
  const ambient = document.getElementById('ambient-bg');
  if(!chat || !ambient) return;

  // Desktop-only: the ambient/centered layout runs on screens wider than 700px.
  // On mobile we leave the original grid home exactly as it was.
  const isDesktop = () => window.innerWidth > 700;

  // Turn the experiment layout ON while on the welcome screen (desktop only).
  function enterExp(){ if(!isDesktop()) return; chat.classList.add('exp-welcome'); startAmbient(); }
  function exitExp(){ chat.classList.remove('exp-welcome'); stopAmbient(); ambient.innerHTML=''; }

  // Hook the app's existing showChat/resetChat so the ambient mode follows state.
  const _showChat = window.showChat;
  window.showChat = function(){ exitExp(); if(typeof _showChat==='function') _showChat(); };
  const _resetChat = window.resetChat;
  window.resetChat = function(){ if(typeof _resetChat==='function') _resetChat(); enterExp(); };

  // Three sources: the visitor's clicked items + past-search items (personal),
  // and the generic hype pool. Personal items float MORE OFTEN so the page feels
  // like theirs; a brand-new visitor with no history just gets the generic pool.
  let poolGeneric = [];
  let poolPersonal = [];
  const normItem = i => ({ image:i.image, price:i.price, country:i.country||'AU', source:i.source||'eBay', url:i.url||'', itemId:i.itemId||'' });
  // Normalise an image URL to a stable key (eBay serves the same picture at many sizes),
  // so dedupe + recently-shown tracking treat size variants as the same item.
  const normKey = u => (u||'').replace(/s-l\d+\./,'s-l300.');

  // Build the personal pool: ALL distinct searched items (deduped by image), INTERLEAVED
  // across every search the visitor has run — round-robin, one item from each search in
  // turn (newest searches first within each round) — so the wall shows a MIX of all their
  // searches (e.g. a Harry Potter set, then a SpongeBob set, then a Yeezy...), not just the
  // most recent search dominating. The rotation logic (pickItem) then cycles forward through
  // this mixed pool, only looping once every item has shown. Returns [] with no history.
  function recentSearchCards(){
    let list = [];
    try{ list = JSON.parse(localStorage.getItem('findai_searched')||'[]'); }catch(_){ list = []; }
    if(!Array.isArray(list) || !list.length) return [];
    const normUrl = u => (u||'').replace(/s-l\d+\./,'s-l300.');
    // Group items by their search term, preserving each search's internal order and
    // the recency order of the searches themselves (list is newest-first).
    const groups = [];                 // [{term, items:[]}], newest search first
    const byTerm = {};
    const seen = new Set();            // global image dedupe
    for(const it of list){
      if(!it || !it.image) continue;
      const key = normUrl(it.image);
      if(seen.has(key)) continue;      // skip exact-image duplicates across searches
      seen.add(key);
      const term = (it.searchQ||'').toLowerCase().trim() || '__';
      if(!(term in byTerm)){ byTerm[term] = { term, items: [] }; groups.push(byTerm[term]); }
      byTerm[term].items.push(it);
    }
    if(!groups.length) return [];
    // Round-robin interleave: take the 1st item of each search, then the 2nd of each, etc.
    const out = [];
    const maxLen = Math.max(...groups.map(g => g.items.length));
    for(let i = 0; i < maxLen; i++){
      for(const g of groups){ if(g.items[i]) out.push(g.items[i]); }
    }
    return out.map(normItem);
  }

  async function loadPool(){
    // Personal pool = clicked + searched items (full distinct pool to rotate through).
    poolPersonal = buildPersonalPool();
    // Generic hype pool from the previews endpoint (fallback / fill).
    try{
      const r = await fetch(`${WORKER}/?previews=1`);
      const d = await r.json();
      poolGeneric = (d.items||[]).filter(i=>i.image).map(normItem);
    }catch(_){ poolGeneric = []; }
  }

  // Merge the visitor's CLICKED items with their searched items into one distinct pool.
  // Clicked items lead (they're the strongest signal of interest) and are followed by the
  // rest of the searched listings — so a clicked item keeps appearing while similar items
  // from the same searches rotate around it. Deduped by image.
  function buildPersonalPool(){
    const searched = recentSearchCards();           // already distinct, normItem-shaped
    let clicked = [];
    try{ clicked = JSON.parse(localStorage.getItem('findai_clicked')||'[]'); }catch(_){ clicked = []; }
    const clickedNorm = (Array.isArray(clicked)?clicked:[])
      .filter(it => it && it.image).map(normItem);
    const seen = new Set();
    const out = [];
    for(const it of [...clickedNorm, ...searched]){  // clicked first, then searched
      const k = normKey(it.image);
      if(seen.has(k)) continue;
      seen.add(k);
      out.push(it);
    }
    return out;
  }

  // Re-read the personal pool (clicked + searched) — cheap, local, no network.
  function refreshPersonalPool(){ poolPersonal = buildPersonalPool(); }

  // Count how many of each image are currently on screen.
  function onScreenCounts(){
    const m = {};
    ambient.querySelectorAll('.ambient-card img').forEach(im=>{
      const s = im.getAttribute('src')||''; m[s] = (m[s]||0) + 1;
    });
    return m;
  }

  // Track images shown recently so the wall CYCLES FORWARD through the pool instead of
  // randomly repeating. We remember the last N distinct images shown; an item is only
  // re-eligible once it's aged out of that memory — so a fresh search shows 4, then 4
  // MORE, then 4 more, working through every listing before any repeats. Once the whole
  // pool has been cycled, the memory naturally frees the oldest items and it loops again.
  const recentlyShown = [];           // image keys, most-recent last
  function rememberShown(img){
    const k = normKey(img);
    const i = recentlyShown.indexOf(k);
    if(i !== -1) recentlyShown.splice(i,1);
    recentlyShown.push(k);
    // Remember as much of the pool as possible so we cycle through nearly EVERY distinct
    // item before repeating any. Headroom = the cards currently visible (so there's always
    // something fresh to place), so cap = poolSize - onScreenCount. For tiny pools this
    // still guarantees max variety before a repeat.
    const poolSize = (poolPersonal.length + poolGeneric.length) || 1;
    const onScreen = ambient.querySelectorAll('.ambient-card').length || 0;
    const cap = Math.max(1, poolSize - Math.max(1, onScreen + 1));
    while(recentlyShown.length > cap) recentlyShown.shift();
  }

  // Pick the next item to float. Priority: personal (recent-search) items the visitor
  // hasn't seen recently and aren't currently on screen; then popular-pool items the same
  // way. This walks forward through the pool so the homepage shows fresh listings and
  // doesn't repeat the same few. No history → popular pool only.
  function pickItem(){
    const counts = onScreenCounts();
    const eligible = (arr) => arr.filter(it =>
      it && it.image &&
      !(counts[normKey(it.image)] > 0) &&            // not already on screen
      recentlyShown.indexOf(normKey(it.image)) === -1 // not shown recently
    );

    let per = eligible(poolPersonal);
    // If every personal item has been shown recently, allow the oldest-shown ones back
    // (cycle restart) — still excluding anything currently on screen.
    if(!per.length && poolPersonal.length){
      per = poolPersonal.filter(it => it && it.image && !(counts[normKey(it.image)] > 0));
    }
    if(per.length){
      const choice = per[Math.floor(Math.random()*per.length)];
      rememberShown(choice.image);
      return choice;
    }

    let gen = eligible(poolGeneric);
    if(!gen.length && poolGeneric.length){
      gen = poolGeneric.filter(it => it && it.image && !(counts[normKey(it.image)] > 0));
    }
    // When the visitor has personal history, only occasionally sprinkle a popular item.
    if(gen.length && (!poolPersonal.length || Math.random() < 0.4)){
      const choice = gen[Math.floor(Math.random()*gen.length)];
      rememberShown(choice.image);
      return choice;
    }
    return null;
  }

  // Cards must avoid the actual on-screen rectangles of the title and the search
  // bar (measured live), plus a margin — so nothing ever clips the text/box,
  // regardless of screen width. Coordinates here are PERCENT of the ambient pane.
  function hitsProtected(xPct, yPct){
    const rect = ambient.getBoundingClientRect();
    if(!rect.width || !rect.height) return false;
    const cardW = (window.innerWidth < 700 ? 96 : 150);
    const cardH = cardW + 34; // image + meta row
    const cx = (xPct/100)*rect.width;
    const cy = (yPct/100)*rect.height;
    const cardBox = { l:cx, t:cy, r:cx+cardW, b:cy+cardH };
    const margin = 40;
    for(const sel of ['#welcome-title', '.input-wrap']){
      const el = document.querySelector(sel);
      if(!el) continue;
      const er = el.getBoundingClientRect();
      const box = { l:er.left-rect.left-margin, t:er.top-rect.top-margin, r:er.right-rect.left+margin, b:er.bottom-rect.top+margin };
      const overlap = !(cardBox.r < box.l || cardBox.l > box.r || cardBox.b < box.t || cardBox.t > box.b);
      if(overlap) return true;
    }
    return false;
  }

  let timer = null;
  function srcLogoHtml(source){
    if(source==='AliExpress') return `<span class="ali-logo" style="font-weight:800;color:#ff4747;font-family:'DM Sans',sans-serif">AliExpress</span>`;
    return `<span class="ebay-logo" style="font-family:Arial,sans-serif;font-weight:900;letter-spacing:-0.3px"><span style="color:#E53238">e</span><span style="color:#0064D2">b</span><span style="color:#F5AF02">a</span><span style="color:#86B817">y</span></span>`;
  }

  // Rough overlap check against cards currently on screen (percent coords).
  function tooClose(xPct, yPct){
    const cards = ambient.querySelectorAll('.ambient-card');
    for(const c of cards){
      const cx = parseFloat(c.style.left), cy = parseFloat(c.style.top);
      if(Math.abs(cx - xPct) < 14 && Math.abs(cy - yPct) < 20) return true;
    }
    return false;
  }

  function popCard(){
    if(!poolGeneric.length && !poolPersonal.length) return;
    // Cap how many are visible at once so it never crowds.
    if(ambient.querySelectorAll('.ambient-card').length >= 4) return;
    const item = pickItem();
    if(!item) return;
    // Find a spot that's outside the protected center AND not overlapping an existing
    // card. Range is clamped so the WHOLE card stays inside the pane (no edge bleed).
    const rect = ambient.getBoundingClientRect();
    const cardW = (window.innerWidth < 700 ? 96 : 150);
    const cardH = cardW + 34;
    const maxXpct = rect.width  ? Math.max(0, (1 - cardW/rect.width)  * 100) : 80;
    const maxYpct = rect.height ? Math.max(0, (1 - cardH/rect.height) * 100) : 80;
    let xPct, yPct, tries=0, ok=false;
    do {
      xPct = Math.random()*maxXpct;
      yPct = Math.random()*maxYpct;
      tries++;
      ok = !hitsProtected(xPct,yPct) && !tooClose(xPct,yPct);
    } while(!ok && tries < 20);
    if(!ok) return; // couldn't place cleanly this tick → skip, try next interval

    const sym = item.country==='UK'?'£':item.country==='DE'?'€':'$';
    const priceTxt = item.price ? `${sym}${Number(item.price).toLocaleString()}` : '';
    const imgSrc = item.image.replace(/s-l\d+\./,'s-l300.');

    // Insert the card NOW (at opacity:0) so it counts toward the cap + overlap checks,
    // but only trigger the fade-in once its image has loaded — so the whole card,
    // picture included, fades in smoothly and identically every time.
    const el = document.createElement(item.url ? 'a' : 'div');
    el.className = 'ambient-card';
    if(item.url){ el.href = item.url; el.target = '_blank'; el.rel = 'noopener'; }
    el.style.left = xPct + '%';
    el.style.top  = yPct + '%';
    el.innerHTML = `<img src="${imgSrc}" alt="">`+
      `<div class="ac-meta">${srcLogoHtml(item.source)}${priceTxt?`<span class="ac-price">${priceTxt}</span>`:''}</div>`;
    ambient.appendChild(el);

    let revealed = false;
    const reveal = ()=>{
      if(revealed) return; revealed = true;
      // Force a reflow so the opacity:0 state is committed before .show → the CSS
      // transition is guaranteed to animate (no instant pop on fast/cached images).
      void el.offsetWidth;
      el.classList.add('show');
      // visible 3s, then a long 1.6s fade out before removal → smooth
      setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(), 1700); }, 3000);
    };
    const imgEl = el.querySelector('img');
    if(imgEl.complete && imgEl.naturalWidth){ reveal(); }
    else { imgEl.addEventListener('load', reveal, {once:true}); imgEl.addEventListener('error', reveal, {once:true}); }
  }

  function startAmbient(){
    if(timer) return;
    // Always re-read personal history (cheap, local) so new searches/clicks appear.
    refreshPersonalPool();
    // Fetch the generic pool only if we don't have it yet (network call).
    if(!poolGeneric.length){
      loadPool().then(()=>{ if(chat.classList.contains('exp-welcome')){ for(let i=0;i<3;i++) setTimeout(popCard, i*400); } });
    } else if(chat.classList.contains('exp-welcome')){
      for(let i=0;i<3;i++) setTimeout(popCard, i*400);
    }
    // a new card attempt every ~1.4s; the cap of 4 + overlap check keep it sparse
    timer = setInterval(()=>{ if(chat.classList.contains('exp-welcome')) popCard(); }, 1400);
  }
  function stopAmbient(){ if(timer){ clearInterval(timer); timer=null; } }

  // Start in experiment mode on load.
  enterExp();

  // ── Search placeholder ──
  // Picks ONE random example per page load (changes only when the site is reloaded).
  (function setPlaceholder(){
    const input = document.getElementById('chat-in');
    if(!input) return;
    const examples = [
      'Find me a Macbook Pro for less than $750',
      'Travis Scott Jordan 1 low',
      'Cheap Yeezy 350s under $200',
      'A sealed Pokémon booster box',
      'Rolex Submariner under $10,000',
      'Labubu the monsters figure',
      'Louis Vuitton Neverfull bag',
      'Air Force 1s in white',
      'PS5 console under $500',
      'Vintage Omega Speedmaster',
      'Supreme box logo hoodie',
      'AirPods Max in space grey',
      'A Cartier Love bracelet',
      'Bape shark hoodie in black'
    ];
    const pick = examples[Math.floor(Math.random()*examples.length)];
    input.setAttribute('placeholder', `Try "${pick}"`);
  })();
})();
</script>
</body>
