<meta name="theme-color" content="#1a6fff">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#000;color:#fff;min-height:100vh;display:flex;flex-direction:column}
nav{padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;position:fixed;top:0;left:0;right:0;z-index:1000;background:#000;border-bottom:1px solid #1a1a1a}
.nav-logo{font-size:24px;font-weight:700;color:#fff;cursor:pointer;letter-spacing:-0.5px;font-family:'DM Sans',sans-serif}
.nav-links{display:flex;gap:6px}
.nav-link{padding:6px 14px;border-radius:20px;font-size:13px;color:#888;background:transparent;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color 0.15s}
.nav-link:hover{color:#fff}
.app{display:flex;flex:1;height:calc(100vh - 52px);margin-top:52px}
.sidebar{width:240px;padding:12px 8px;display:flex;flex-direction:column;gap:2px;border-right:1px solid #1a1a1a;flex-shrink:0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sb-recent-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;font-size:13px;color:#aaa;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:none;border:none;width:100%;text-align:left;transition:background 0.15s,color 0.15s}
.sb-recent-item:hover{background:#1a1a1a;color:#fff}
.sb-recent-item svg{flex-shrink:0;opacity:0.5}
.sb-new{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:15px;color:#888;background:none;border:none;font-family:'DM Sans',sans-serif;width:100%;text-align:left;transition:all 0.15s;margin-bottom:8px}
.sb-new:hover{background:#111;color:#fff}
.sb-section{font-size:12px;color:#555;padding:8px 14px 6px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em}
.sb-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:15px;color:#888;background:none;border:none;font-family:'DM Sans',sans-serif;width:100%;text-align:left;transition:all 0.15s}
.sb-item:hover{background:#111;color:#fff}
.sb-item.active{background:#111;color:#fff}
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;padding:40px 24px 140px;text-align:center;overflow-y:auto}
.welcome-top{display:flex;flex-direction:column;align-items:center;margin-bottom:36px}
.welcome h1{font-size:clamp(26px,4vw,38px);font-weight:500;color:#fff;margin-bottom:10px;letter-spacing:-0.5px}
.welcome-sub{font-size:15px;color:#666}
.preview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:960px;width:100%;margin:0 auto 32px}
.prev-card{background:#111;border:1px solid #222;border-radius:10px;overflow:hidden;cursor:pointer;transition:opacity 0.5s,transform 0.5s,border-color 0.15s;text-decoration:none;display:block;color:inherit;position:relative}
.prev-card:hover{border-color:#444;transform:translateY(-1px)}
.prev-card.fade-out{opacity:0;transform:translateY(6px)}
.prev-card-img{width:100%;height:110px;object-fit:cover;display:block;background:#1a1a1a}
.prev-card-ph{width:100%;height:110px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:24px}
.prev-card-body{padding:7px 10px 8px}
.prev-card-title{font-size:11px;color:#aaa;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prev-card-price{font-size:13px;font-weight:700;color:#19c37d}
/* source logo row */
.prev-card-source{display:flex;align-items:center;gap:4px;margin-bottom:4px}
/* eBay inline logo */
.ebay-logo{font-size:13px;font-family:Arial,sans-serif;font-weight:900;letter-spacing:-0.3px;line-height:1}
/* AliExpress logo */
.ali-logo{font-size:10px;font-weight:800;color:#ff4747;font-family:'DM Sans',sans-serif;letter-spacing:-0.2px}
/* AliExpress card highlight border */
.prev-card.ali-card{border-color:#2a1a1a}
.prev-card.ali-card:hover{border-color:#ff4747}

/* messages */
.messages{flex:1;overflow-y:auto;padding:24px 32px 170px;display:flex;flex-direction:column;gap:20px;width:100%;align-self:stretch}
.messages-inner{max-width:1100px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:20px;flex:1}
.msg{display:flex;gap:12px;width:100%}
.msg.user{flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.msg-av.u{background:#fff;color:#000;border:1px solid #e0e0e0}
.msg-av.a{background:#fff;border:1px solid #e0e0e0;position:relative}
.msg-av.a::after{content:'';position:absolute;width:10px;height:10px;border-radius:50%;background:#000}
.msg-body{max-width:calc(100% - 44px);font-size:14px;line-height:1.65;color:#e5e5e5;padding:12px 16px;border-radius:12px;background:#111;border:1px solid #222}
.msg.assistant .msg-body{max-width:100%;width:100%}
.msg.user .msg-body{background:#fff;color:#000;border-color:#e0e0e0}
.chat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px;width:100%}
.chat-card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden;text-decoration:none;display:block;color:inherit;transition:box-shadow 0.15s,transform 0.15s}
.chat-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1);transform:translateY(-2px)}
.chat-card-img{width:100%;height:160px;object-fit:cover;display:block;background:#f5f5f5}
.chat-card-ph{width:100%;height:160px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:32px}
.chat-card-body{padding:10px 12px}
.chat-card-title{font-size:12px;color:#444;margin-bottom:6px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.chat-card-price{font-size:16px;font-weight:800;color:#19c37d;letter-spacing:-0.3px}
.chat-card-loc{font-size:10px;color:#999;margin-top:3px}
.thinking{display:flex;gap:5px;padding:12px 16px;background:#111;border:1px solid #222;border-radius:12px;width:fit-content}
.thinking span{width:7px;height:7px;background:#444;border-radius:50%;animation:bounce 1.2s infinite}
.thinking span:nth-child(2){animation-delay:0.2s}
.thinking span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
.input-area{padding:12px 24px calc(20px + env(safe-area-inset-bottom));background:#000;position:fixed;bottom:0;left:240px;right:0;z-index:1000;border-top:1px solid #1a1a1a}
.input-wrap{max-width:820px;margin:0 auto;background:#1a1a1a;border:1.5px solid #333;border-radius:20px;display:flex;align-items:flex-end;gap:8px;padding:20px 16px 20px 24px;transition:border-color 0.2s,box-shadow 0.2s;box-shadow:0 4px 32px rgba(0,0,0,0.6)}
.input-wrap:focus-within{border-color:#555;box-shadow:0 4px 40px rgba(255,255,255,0.08)}
.chat-in{flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:16px;resize:none;max-height:120px;min-height:28px;line-height:1.6;caret-color:#fff}
.chat-in::placeholder{color:#888;font-size:16px}
.send-btn{width:34px;height:34px;border-radius:8px;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s}
.send-btn:hover{background:#e0e0e0}
.send-btn:disabled{background:#222;cursor:not-allowed}
.skel{background:linear-gradient(90deg,#111 25%,#1a1a1a 50%,#111 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#222;border-radius:3px}
@media(max-width:700px){
  .sidebar{display:none}
  nav{position:fixed;top:0;left:0;right:0;height:52px;z-index:9999;background:#000;border-bottom:1px solid #1a1a1a}
  .app{height:calc(100dvh - 52px);margin-top:52px}
  .chat{height:calc(100dvh - 52px);overflow:hidden;display:flex;flex-direction:column}
  .messages{flex:1;overflow-y:auto;padding:12px 4px 170px;-webkit-overflow-scrolling:touch}
  .input-area{position:fixed;left:0;right:0;bottom:0;z-index:9999;padding:8px 8px calc(20px + env(safe-area-inset-bottom));background:#000;border-top:1px solid #1a1a1a}
  .welcome{padding-top:8px;padding-bottom:160px;overflow-y:auto;justify-content:flex-start}
  .welcome-sub{display:none}
  .welcome h1{font-size:24px;margin-bottom:6px}
  .welcome-top{margin-bottom:10px}
  .chat-grid{grid-template-columns:repeat(3,1fr);gap:3px;width:100%}
  .preview-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .prev-card-img{height:100px}
  .prev-card-ph{height:100px}
  .prev-card-body{padding:5px 7px}
  .prev-card-title{font-size:10px}
  .prev-card-price{font-size:12px}
  .chat-card{border-radius:6px}
  .chat-card-img{height:130px}
  .chat-card-ph{height:130px}
  .chat-card-body{padding:5px 6px}
  .chat-card-title{font-size:10px;-webkit-line-clamp:2}
  .chat-card-price{font-size:12px;font-weight:800}
  .chat-card-loc{display:none}
  .msg{gap:4px}

<body>

<div class="app">

          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>

<script>
const WORKER='https://api.carsearchapi.workers.dev';
let country='AU';
const EBAY_CAMPAIGN_ID='5339155260';
const EPN_MKRID={US:'711-53200-19255-0',AU:'705-53470-19255-0',UK:'710-53481-19255-0',DE:'707-53477-19255-0'};

// ── Source logo HTML helpers ──────────────────────────────────────────────
function ebayLogoHtml() {
  return `<span class="ebay-logo"><span style="color:#E53238">e</span><span style="color:#0064D2">b</span><span style="color:#F5AF02">a</span><span style="color:#86B817">y</span></span>`;
}
function aliLogoHtml() {
  return `<span class="ali-logo">AliExpress</span>`;
}

let busy=false, previewItems=[], previewIdx=0;

function resetChat(){
  document.getElementById('welcome').style.display='flex';
  document.getElementById('messages').style.display='none';
  document.getElementById('messages-inner').innerHTML='';
  document.getElementById('chat-in').value='';
}
function showChat(){
  document.getElementById('welcome').style.display='none';
  document.getElementById('messages').style.display='flex';
}
function addMsg(role,html){
  const inner=document.getElementById('messages-inner');
  const d=document.createElement('div'); d.className=`msg ${role}`;
  const av=role==='user'?`<div class="msg-av u">U</div>`:`<div class="msg-av a"></div>`;
  d.innerHTML=`${av}<div class="msg-body">${html}</div>`;
  inner.appendChild(d); return d.querySelector('.msg-body');
}
function addThinking(){
  const inner=document.getElementById('messages-inner');
  const d=document.createElement('div'); d.className='msg assistant'; d.id='thinking';
  d.innerHTML=`<div class="msg-av a"></div><div class="thinking"><span></span><span></span><span></span></div>`;
  inner.appendChild(d);
}
function removeThinking(){const t=document.getElementById('thinking');if(t)t.remove();}

function parseQuery(text){
  const lower=text.toLowerCase();
  let cleaned=lower
    .replace(/^(show me|find me|search for|look for|i want|get me|can you find|find|show|search)\s+/i,'')
    .replace(/\b(a|an|the|some|any)\s+/gi,' ').replace(/\bfor sale\b/gi,'').replace(/\s+/g,' ').trim();
  let maxPrice='';
  const pm=cleaned.match(/(?:under|below|max|less than|for less than|up to|no more than|for)\s*\$?\s*([0-9,.]+)\s*(k|m|thousand|dollars|dollar|usd|aud)?/i);
  if(pm){
    let p=parseFloat(pm[1].replace(/,/g,''));
    const unit=(pm[2]||'').toLowerCase();
    if(unit==='k')p*=1000; if(unit==='m')p*=1000000;
    maxPrice=Math.round(p);
    cleaned=cleaned.replace(/(?:under|below|max|less than|for less than|up to|no more than|for)\s*\$?\s*[0-9,.]+\s*(k|m|thousand|dollars|dollar|usd|aud)?/i,'');
  }
  cleaned=cleaned.replace(/\b(dollars|dollar|usd|aud|less|than)\b/gi,'').replace(/\s+/g,' ').trim();
  let c=country;
  if(lower.match(/\b(australia|australian|aus|in au)\b/))c='AU';
  else if(lower.match(/\b(united states|america|american|in us|in the us|from us|from the us|usa)\b/))c='US';
  else if(lower.match(/\b(united kingdom|england|english|in uk|in the uk|from uk|britain|british)\b/))c='UK';
  else if(lower.match(/\b(germany|german|deutschland|in germany)\b/))c='DE';
  return{q:cleaned,maxPrice,country:c};
}

const PAGE_SIZE=40; let searchCount=0; const searchStates={};

function renderCards(items,label,_m,maxPrice,c,ebayCount,etsyCount){
  const sym=c==='UK'?'£':c==='DE'?'€':'$';
  if(!items.length) return `<p style="color:#666;font-size:14px;margin-top:8px">No listings found right now. Try a different search.</p>`;
  searchCount++; const sid=searchCount;
  searchStates[sid]={items,shown:Math.min(PAGE_SIZE,items.length),query:label};
  const top=items.slice(0,searchStates[sid].shown);
  const totalFound=ebayCount+etsyCount;
  const displayCount=totalFound>0?totalFound:items.length;
  let summary='';
  if(label){
    const lc=label.charAt(0).toUpperCase()+label.slice(1);
    summary=`Here's what I found for <strong>${lc}</strong>`;
    if(maxPrice)summary+=` under ${sym}${Number(maxPrice).toLocaleString()}`;
    summary+=` <span style="color:#666;font-size:12px">(${displayCount} listings · showing ${searchStates[sid].shown})</span>`;
  }else{
    summary=`Found <strong>${displayCount} listing${displayCount!==1?'s':''}</strong>`;
    if(maxPrice)summary+=` under ${sym}${Number(maxPrice).toLocaleString()}`;
    summary+=` <span style="color:#666;font-size:12px">· showing ${searchStates[sid].shown}</span>`;
  }
  const cards=top.map(item=>{
    const price=item.price?`${sym}${Number(item.price).toLocaleString()}`:'See listing';
    const isAli=item.source==='AliExpress';
    const srcBadge=isAli
      ?`<span style="font-size:11px;font-weight:800;color:#ff4747;font-family:'DM Sans',sans-serif">AliExpress</span>`
      :ebayLogoHtml();
    const imgSrc=item.image&&!isAli?item.image.replace(/s-l\d+\./,'s-l600.'):item.image;
    return `<a class="chat-card" href="${item.url}" target="_blank" rel="noopener">${imgSrc?`<img class="chat-card-img" src="${imgSrc}" alt="" loading="lazy" onerror="this.parentNode.querySelector('.chat-card-ph')&&(this.style.display='none')">`:`<div class="chat-card-ph">🛍️</div>`}<div class="chat-card-body"><div style="margin-bottom:5px">${srcBadge}</div><div class="chat-card-title">${item.title||''}</div><div class="chat-card-price">${price}</div><div class="chat-card-loc">${item.location||''}</div></div></a>`;
  }).join('');
  const gId='chat-grid-'+sid,bId='show-more-'+sid;
  const rem0=items.length-searchStates[sid].shown;
  const smBtn=rem0>0?`<div id="${bId}" style="text-align:center;margin-top:16px"><button onclick="showMoreCards(${sid})" style="background:#111;border:1px solid #333;color:#fff;padding:10px 28px;border-radius:8px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif" onmouseover="this.style.background='#222'" onmouseout="this.style.background='#111'">Show more</button></div>`:'';
  return `<p style="font-size:14px;color:#fff;margin-bottom:12px;padding:0 2px">${summary}</p><div class="chat-grid" id="${gId}">${cards}</div>${smBtn}`;
}

function showMoreCards(sid){
  const state=searchStates[sid];
  if(!state||state.shown>=state.items.length)return;
  const sym=country==='UK'?'£':country==='DE'?'€':'$';
  const grid=document.getElementById('chat-grid-'+sid);
  const btnWrap=document.getElementById('show-more-'+sid);
  if(!grid)return;
  const nextBatch=state.items.slice(state.shown,state.shown+PAGE_SIZE);
  if(!nextBatch.length)return;
  state.shown+=nextBatch.length;
  nextBatch.forEach(item=>{
    const price=item.price?`${sym}${Number(item.price).toLocaleString()}`:'See listing';
    const isAli=item.source==='AliExpress';
    const srcBadge=isAli?`<span style="font-size:11px;font-weight:800;color:#ff4747">AliExpress</span>`:ebayLogoHtml();
    const imgSrc=item.image&&!isAli?item.image.replace(/s-l\d+\./,'s-l600.'):item.image;
    const card=document.createElement('a');
    card.className='chat-card'; card.href=item.url; card.target='_blank'; card.rel='noopener';
    card.innerHTML=(imgSrc?`<img class="chat-card-img" src="${imgSrc}" alt="" loading="lazy">`:
      `<div class="chat-card-ph">🛍️</div>`)+
      `<div class="chat-card-body"><div style="margin-bottom:5px">${srcBadge}</div><div class="chat-card-title">${item.title||''}</div><div class="chat-card-price">${price}</div><div class="chat-card-loc">${item.location||''}</div></div>`;
    grid.appendChild(card);
  });
  if(btnWrap){
    const rem=state.items.length-state.shown;
    const b=btnWrap.querySelector('button');
    if(rem<=0){if(b){b.textContent='Search for more';b.onclick=function(){window.open('https://www.ebay.com.au/sch/i.html?_nkw='+encodeURIComponent(state.query||''),'_blank');}}}
    else{if(b)b.textContent='Show more';}
  }
}

async function sendMsg(){
  const inp=document.getElementById('chat-in');
  const q=inp.value.trim();
  if(!q||busy)return;
  saveRecentSearch(q);
  busy=true; document.getElementById('send-btn').disabled=true;
  inp.value=''; inp.style.height='auto';
  showChat(); addMsg('user',q); addThinking();
  const{q:cleanQ,maxPrice,country:c}=parseQuery(q);
  try{
    const params=new URLSearchParams({q:cleanQ,maxPrice:maxPrice||'',country:c});
    const res=await fetch(`${WORKER}/?${params}`);
    const data=await res.json();
    removeThinking();
    addMsg('assistant',renderCards(data.items||[],cleanQ,'',maxPrice,c,data.ebayCount||0,data.etsyCount||0));
    setTimeout(()=>{
      const inner=document.getElementById('messages-inner');
      const userMsgs=inner?inner.querySelectorAll('.msg.user'):[];
      if(userMsgs.length)userMsgs[userMsgs.length-1].scrollIntoView({behavior:'smooth',block:'start'});
    },150);
  }catch(e){removeThinking();addMsg('assistant','Sorry, could not fetch listings right now. Please try again.');}
  busy=false; document.getElementById('send-btn').disabled=false; inp.focus();
}

function categorySearch(query,label){
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('chat-in').value=query; sendMsg();
}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

// ── HARDCODED BEST-SELLING ALIEXPRESS ITEMS ───────────────────────────────
// These 2 always show on the homepage — no API needed, guaranteed visible
// Affiliate links include tracking_id=default
// Best-selling AliExpress queries — fetched live from the worker so images are always real
const ALI_BEST_SELLER_QUERIES = []; // Disabled — awaiting AliExpress Advanced API approval

// Fetches the top AliExpress item for each query via the worker
// Falls back to best eBay item if AliExpress not yet live in worker
async function fetchAliBestSellers() {
  const results = await Promise.allSettled(
    ALI_BEST_SELLER_QUERIES.map(q =>
      fetch(`${WORKER}/?q=${encodeURIComponent(q)}&country=AU`)
        .then(r => r.json())
        .then(d => {
          const items = d.items || [];
          // Prefer AliExpress source once worker is deployed
          const ali = items.find(i => i.image && i.source === 'AliExpress');
          // Fallback: any item with an image
          const fallback = items.find(i => i.image);
          const item = ali || fallback;
          if (!item) return null;
          return { ...item, _isAli: item.source === 'AliExpress', _pinned: true, searchQ: q };
        })
        .catch(() => null)
    )
  );
  return results
    .filter(r => r.status === 'fulfilled' && r.value)
    .map(r => r.value);
}

// ── EBAY PREVIEW QUERIES ──────────────────────────────────────────────────
const PREVIEWS=[
  {q:'Air Jordan 1 Retro High OG',country:'US'},{q:'Nike SB Dunk Low',country:'US'},{q:'Yeezy 350 V2',country:'US'},
  {q:'New Balance 550',country:'US'},{q:'Adidas Samba',country:'AU'},{q:'Travis Scott Jordan',country:'US'},
  {q:'iPhone 15 Pro Max',country:'AU'},{q:'MacBook Pro M3',country:'AU'},{q:'Sony PlayStation 5',country:'AU'},
  {q:'AirPods Pro 2',country:'AU'},{q:'Nintendo Switch OLED',country:'AU'},
  {q:'Rolex Submariner',country:'UK'},{q:'Rolex Daytona',country:'US'},{q:'Audemars Piguet Royal Oak',country:'US'},
  {q:'Omega Speedmaster',country:'UK'},{q:'Cartier Santos',country:'US'},
  {q:'Louis Vuitton bag',country:'US'},{q:'Chanel classic flap',country:'UK'},{q:'Hermes Birkin',country:'US'},
  {q:'Gucci bag',country:'US'},{q:'Prada bag',country:'US'},
  {q:'Supreme hoodie',country:'US'},{q:'Bape shark hoodie',country:'US'},{q:'Off White sneakers',country:'US'},
  {q:'Pokemon Charizard PSA 10',country:'US'},{q:'Pokemon booster box',country:'AU'},
  {q:'Labubu Pop Mart',country:'AU'},{q:'Ferrari',country:'AU'},{q:'Porsche 911',country:'AU'},
];

const INITIAL_ROWS=3,CARDS_PER_ROW=4,INITIAL_CARDS=INITIAL_ROWS*CARDS_PER_ROW;
let previewLoadedAll=false,previewLoadingMore=false;
// Ali rotation pool for the 2 pinned slots
async function fetchPreviewBatch(queries){
  const results=await Promise.allSettled(
    queries.map(s=>
      fetch(`${WORKER}/?q=${encodeURIComponent(s.q)}&country=${s.country}`)
        .then(r=>r.json())
        .then(d=>(d.items||[]).filter(i=>i.image).slice(0,3).map(i=>({...i,searchQ:s.q,country:s.country})))
        .catch(()=>[])
    )
  );
  const items=[];
  results.forEach(r=>{if(r.status==='fulfilled')items.push(...r.value);});
  return items.sort(()=>Math.random()-0.5);
}

async function loadPreviews(){
  const grid=document.getElementById('preview-grid');
  if(!grid)return;

  // Skeletons
  grid.innerHTML=Array.from({length:INITIAL_CARDS},()=>`
    <div class="prev-card"><div class="skel prev-card-img"></div>
    <div class="prev-card-body">
      <div class="skel" style="height:8px;width:50%;margin-bottom:4px"></div>
      <div class="skel" style="height:9px;width:85%;margin-bottom:4px"></div>
      <div class="skel" style="height:11px;width:35%"></div>
    </div></div>`).join('');

  // Fetch from more queries than needed to guarantee 8 unique cards
  const shuffled=[...PREVIEWS].sort(()=>Math.random()-0.5);
  // Fetch 16 queries to ensure we get at least 8 unique items
  const ebayItems = await fetchPreviewBatch(shuffled.slice(0, 16));

  // Deduplicate by itemId
  const seen = new Set();
  const unique = ebayItems.filter(i => {
    if (!i.itemId || seen.has(i.itemId)) return false;
    seen.add(i.itemId);
    return true;
  });

  // Always pad to 8 with more fetches if needed
  let merged = unique.slice(0, INITIAL_CARDS);
  if (merged.length < INITIAL_CARDS) {
    const extra = await fetchPreviewBatch(shuffled.slice(16, 24));
    const extraUnique = extra.filter(i => i.itemId && !seen.has(i.itemId));
    extraUnique.forEach(i => seen.add(i.itemId));
    merged = [...merged, ...extraUnique].slice(0, INITIAL_CARDS);
  }

  previewItems.push(...merged);
  if(!previewItems.length){grid.innerHTML='';return;}
  grid.innerHTML=previewItems.slice(0,INITIAL_CARDS).map(buildPrevCard).join('');
  previewIdx=INITIAL_CARDS;

  setInterval(rotatePrev,4000);

  // Infinite scroll — eBay only for extra rows
  const welcome=document.getElementById('welcome');
  if(welcome){
    welcome.addEventListener('scroll',async()=>{
      if(previewLoadingMore||previewLoadedAll)return;
      if(welcome.scrollHeight-welcome.scrollTop-welcome.clientHeight<300){
        previewLoadingMore=true;
        const skelRow=document.createElement('div');
        skelRow.id='skel-row'; skelRow.style.cssText='display:contents';
        skelRow.innerHTML=Array.from({length:CARDS_PER_ROW},()=>`
          <div class="prev-card"><div class="skel prev-card-img"></div>
          <div class="prev-card-body">
            <div class="skel" style="height:8px;width:50%;margin-bottom:4px"></div>
            <div class="skel" style="height:9px;width:85%;margin-bottom:4px"></div>
            <div class="skel" style="height:11px;width:35%"></div>
          </div></div>`).join('');
        grid.appendChild(skelRow);
        const nextBatch=[...PREVIEWS].sort(()=>Math.random()-0.5).slice(0,CARDS_PER_ROW*2);
        const newItems=await fetchPreviewBatch(nextBatch);
        const sr=document.getElementById('skel-row');
        if(sr)sr.remove();
        if(newItems.length){
          newItems.forEach(item=>{
            const tmp=document.createElement('div');
            tmp.innerHTML=buildPrevCard(item);
            grid.appendChild(tmp.firstElementChild);
          });
          previewItems.push(...newItems);
        }else previewLoadedAll=true;
        previewLoadingMore=false;
      }
    });
  }
}

function buildPrevCard(item){
  const sym=item.country==='UK'?'£':item.country==='DE'?'€':'$';
  const price=item.price?`${sym}${Number(item.price).toLocaleString()}`:'';
  const title=(item.title||'').substring(0,38)+((item.title||'').length>38?'…':'');
  const isAli=item._isAli||item.source==='AliExpress';
  const sourceLine=isAli
    ?`<div class="prev-card-source">${aliLogoHtml()}</div>`
    :`<div class="prev-card-source">${ebayLogoHtml()}</div>`;
  return `<a class="prev-card${isAli?' ali-card':''}" data-id="${item.itemId||''}" href="${item.url}" target="_blank" rel="noopener">
    ${item.image
      ?`<img class="prev-card-img" src="${item.image}" alt="" loading="lazy" onerror="this.outerHTML='<div class=prev-card-ph>🛍️</div>'">`
      :`<div class="prev-card-ph">🛍️</div>`}
    <div class="prev-card-body">${sourceLine}<div class="prev-card-title">${title}</div><div class="prev-card-price">${price}</div></div>
  </a>`;
}

function rotatePrev(){
  if(previewItems.length<5)return;
  const grid=document.getElementById('preview-grid');
  if(!grid)return;
  const allCards=Array.from(grid.querySelectorAll('.prev-card:not(.fade-out)'));
  if(!allCards.length)return;

  // Get currently visible itemIds to avoid duplicates
  const visibleIds=new Set(Array.from(grid.querySelectorAll('.prev-card[data-id]')).map(c=>c.dataset.id));

  const rotateable=allCards.slice(0,INITIAL_CARDS).filter(c=>!c.classList.contains('ali-card'));
  if(!rotateable.length)return;
  const card=rotateable[Math.floor(Math.random()*rotateable.length)];
  card.classList.add('fade-out');
  setTimeout(()=>{
    // Find next item that isn't already visible
    let attempts=0, newItem=null;
    while(attempts<previewItems.length){
      const candidate=previewItems[previewIdx%previewItems.length];
      previewIdx++;
      attempts++;
      if(!visibleIds.has(candidate.itemId)){newItem=candidate;break;}
    }
    if(!newItem)newItem=previewItems[previewIdx%previewItems.length];
    const tmp=document.createElement('div');
    tmp.innerHTML=buildPrevCard(newItem);
    card.replaceWith(tmp.firstElementChild);
  },500);
}

loadPreviews();

// ── Recent Searches ───────────────────────────────────────────────────────
function saveRecentSearch(query) {
  if (!query || query.length < 2) return;
  let recents = JSON.parse(localStorage.getItem('findai_recents') || '[]');
  recents = recents.filter(r => r.toLowerCase() !== query.toLowerCase());
  recents.unshift(query);
  recents = recents.slice(0, 8); // keep last 8
  localStorage.setItem('findai_recents', JSON.stringify(recents));
  renderRecents();
}

function renderRecents() {
  const recents = JSON.parse(localStorage.getItem('findai_recents') || '[]');
  const container = document.getElementById('recent-searches');
  const section = document.getElementById('recent-section');
  if (!container) return;
  if (!recents.length) { section.style.display='none'; container.innerHTML=''; return; }
  section.style.display='';
  container.innerHTML = recents.map(r => `
    <button class="sb-recent-item" onclick="recentSearch('${r.replace(/'/g,"\'")}')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      ${r.substring(0,28)}${r.length>28?'…':''}
    </button>`).join('');
}

function recentSearch(query) {
  document.getElementById('chat-in').value = query;
  sendMsg();
}

renderRecents();
</script>
